<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 — 領餐核銷</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 20px;
}
.card {
  background: #fff; border-radius: 20px; max-width: 360px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden;
}
.hdr {
  background: linear-gradient(135deg, #1B5E20, #2E7D32);
  padding: 22px 20px 18px; text-align: center; color: #fff;
}
.hdr-icon { font-size: 34px; margin-bottom: 5px; }
.hdr h2 { font-size: 17px; font-weight: 700; margin: 0 0 2px; }
.hdr p  { font-size: 12px; opacity: 0.8; margin: 0; }

/* ── Loading ── */
.scn { display: none; flex-direction: column; padding-bottom: 24px; }
.scn.active { display: flex; }
.loading { color: #888; font-size: 14px; text-align: center; padding: 32px 20px; }
.spinner {
  width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #2E7D32;
  border-radius: 50%; animation: rotate .7s linear infinite; margin: 0 auto 10px;
}
@keyframes rotate { to { transform: rotate(360deg); } }

/* ── 時段鎖定畫面 ── */
.locked-wrap { padding: 32px 24px 28px; text-align: center; }
.locked-icon { font-size: 52px; margin-bottom: 14px; }
.locked-title { font-size: 18px; font-weight: 800; color: #1B5E20; margin-bottom: 10px; }
.locked-sub   { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 20px; }
.time-slots   { display: flex; flex-direction: column; gap: 10px; margin: 0 0 20px; }
.slot-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 12px; border: 2px solid #e2e8f0;
  text-align: left;
}
.slot-row.active-slot { border-color: #2E7D32; background: #f0fdf4; }
.slot-icon  { font-size: 22px; flex-shrink: 0; }
.slot-name  { font-size: 13px; font-weight: 700; color: #1e293b; margin-bottom: 1px; }
.slot-time  { font-size: 12px; color: #64748b; }
.slot-row.active-slot .slot-name { color: #15803d; }
.countdown  { font-size: 12px; color: #2E7D32; font-weight: 700; margin-top: 4px; }

/* ── 選擇領餐類型 ── */
.choose-wrap { padding: 20px 20px 4px; }
.choose-title { font-size: 14px; font-weight: 700; color: #334155; margin-bottom: 14px; text-align: center; }
.meal-btn {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 16px 18px; border-radius: 14px;
  border: 2px solid #e2e8f0; background: #fff;
  cursor: pointer; margin-bottom: 12px; transition: all .15s;
  text-align: left;
}
.meal-btn:hover { border-color: #2E7D32; background: #f0fdf4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46,125,50,.12); }
.meal-btn:active { transform: translateY(0); }
.meal-btn.selected { border-color: #1B5E20; background: #f0fdf4; }
.meal-btn-icon  { font-size: 28px; flex-shrink: 0; }
.meal-btn-title { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 2px; }
.meal-btn-sub   { font-size: 12px; color: #64748b; }
.meal-btn.selected .meal-btn-title { color: #15803d; }

/* ── 確認核銷畫面 ── */
.confirm-wrap { padding: 24px 20px 8px; }
.member-card {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border: 2px solid #86efac; border-radius: 14px;
  padding: 16px 18px; margin-bottom: 16px;
}
.member-name   { font-size: 15px; font-weight: 800; color: #15803d; margin-bottom: 4px; }
.member-detail { font-size: 12px; color: #166534; line-height: 1.6; }
.meal-confirm-card {
  background: #FFF8E1; border: 2px solid #FFE082; border-radius: 14px;
  padding: 16px 18px; margin-bottom: 16px; text-align: center;
}
.meal-confirm-icon  { font-size: 36px; margin-bottom: 6px; }
.meal-confirm-title { font-size: 15px; font-weight: 800; color: #E65100; margin-bottom: 4px; }
.meal-confirm-note  { font-size: 12px; color: #888; line-height: 1.6; }
.warning-box {
  background: #FFF7ED; border: 1.5px solid #FED7AA; border-radius: 10px;
  padding: 10px 12px; margin-bottom: 16px;
  font-size: 11px; color: #9A3412; line-height: 1.7;
}
.warning-box strong { display: block; font-size: 12px; margin-bottom: 3px; color: #7C2D12; }

/* ── 按鈕 ── */
.btn-area { padding: 0 20px 8px; }
.btn-main {
  display: block; width: 100%; padding: 15px; border-radius: 12px;
  border: none; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: background .2s; margin-bottom: 10px;
}
.btn-main.green { background: #15803d; color: #fff; }
.btn-main.green:hover { background: #166534; }
.btn-main.green:active { background: #14532d; }
.btn-main.grey  { background: #e2e8f0; color: #64748b; cursor: not-allowed; }
.btn-back {
  display: block; width: 100%; padding: 11px; border-radius: 12px;
  border: 1.5px solid #cbd5e1; background: #fff; font-size: 14px;
  color: #64748b; cursor: pointer; text-align: center; font-weight: 600;
  transition: all .15s;
}
.btn-back:hover { border-color: #94a3b8; background: #f8fafc; }

/* ── 結果畫面 ── */
.result-wrap { padding: 40px 24px 28px; text-align: center; }
.result-icon  { font-size: 54px; margin-bottom: 14px; }
.result-title { font-size: 19px; font-weight: 800; color: #1B5E20; margin-bottom: 8px; }
.result-sub   { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 20px; }
.result-title.error { color: #DC2626; }
.btn-close {
  display: inline-block; padding: 13px 32px; border-radius: 12px;
  background: #15803d; color: #fff; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer; transition: background .2s;
}
.btn-close:hover { background: #166534; }

/* ── 無資格畫面 ── */
.no-elig-wrap { padding: 36px 24px 28px; text-align: center; }
.no-elig-icon  { font-size: 48px; margin-bottom: 14px; }
.no-elig-title { font-size: 18px; font-weight: 800; color: #DC2626; margin-bottom: 10px; }
.no-elig-sub   { font-size: 13px; color: #666; line-height: 1.7; margin-bottom: 20px; }

/* ── 浮動時鐘 ── */
.live-clock {
  font-size: 11px; color: rgba(255,255,255,0.7);
  text-align: center; padding: 4px 0 6px;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="hdr-icon">🥩</div>
    <h2>無名牛排 · 領餐核銷</h2>
    <p>早餐 / 宵夜 兌換專區</p>
    <div class="live-clock" id="liveClock"></div>
  </div>

  <!-- Loading -->
  <div class="scn active" id="scn-loading">
    <div class="loading">
      <div class="spinner"></div>
      <p>正在驗證身份…</p>
    </div>
  </div>

  <!-- 時段鎖定（非時段） -->
  <div class="scn" id="scn-locked">
    <div class="locked-wrap">
      <div class="locked-icon">🔒</div>
      <div class="locked-title">目前不在領餐時段</div>
      <div class="locked-sub">請在以下時段內開啟此頁面，才能領取早餐或宵夜。</div>
      <div class="time-slots">
        <div class="slot-row" id="slot-breakfast">
          <div class="slot-icon">🌅</div>
          <div>
            <div class="slot-name">早餐時段</div>
            <div class="slot-time">每天 07:00 ～ 10:30</div>
          </div>
        </div>
        <div class="slot-row" id="slot-nightsnack">
          <div class="slot-icon">🌙</div>
          <div>
            <div class="slot-name">宵夜時段</div>
            <div class="slot-time">每天 20:30 ～ 21:30</div>
          </div>
        </div>
      </div>
      <div class="locked-sub" style="font-size:12px; color:#2E7D32; font-weight:600;" id="nextSlotTip"></div>
    </div>
  </div>

  <!-- 選擇領餐類型（時段內） -->
  <div class="scn" id="scn-choose">
    <div class="choose-wrap">
      <div class="choose-title">請選擇要領取的餐點 🍽️</div>
      <button class="meal-btn" id="btn-breakfast" onclick="selectMeal('breakfast')">
        <span class="meal-btn-icon">🌅</span>
        <div>
          <div class="meal-btn-title">早餐</div>
          <div class="meal-btn-sub">限早餐時段 07:00–10:30 領取</div>
        </div>
      </button>
      <button class="meal-btn" id="btn-nightsnack" onclick="selectMeal('nightsnack')">
        <span class="meal-btn-icon">🌙</span>
        <div>
          <div class="meal-btn-title">宵夜</div>
          <div class="meal-btn-sub">限宵夜時段 20:30–21:30 領取</div>
        </div>
      </button>
    </div>
    <div class="btn-area">
      <button class="btn-main grey" id="btn-next" disabled onclick="goConfirm()">確認領取</button>
    </div>
  </div>

  <!-- 確認核銷 -->
  <div class="scn" id="scn-confirm">
    <div class="confirm-wrap">
      <div class="member-card">
        <div class="member-name" id="confirm-name">會員姓名</div>
        <div class="member-detail" id="confirm-detail"></div>
      </div>
      <div class="meal-confirm-card">
        <div class="meal-confirm-icon" id="confirm-icon">🍱</div>
        <div class="meal-confirm-title" id="confirm-title">早餐核銷</div>
        <div class="meal-confirm-note">核銷後資格立即扣除<br>每日限領 1 次，請確認後再按下方按鈕</div>
      </div>
      <div class="warning-box">
        <strong>⚠️ 注意事項</strong>
        核銷後無法撤銷，請確認餐點已準備好再操作。資格有效期為消費日起 7 天內。
      </div>
    </div>
    <div class="btn-area">
      <button class="btn-main green" onclick="doClaim()">✅ 確認核銷</button>
      <button class="btn-back" onclick="goBack()">← 返回重選</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="scn" id="scn-result">
    <div class="result-wrap">
      <div class="result-icon" id="result-icon">✅</div>
      <div class="result-title" id="result-title">核銷成功！</div>
      <div class="result-sub" id="result-sub">請至櫃台取餐</div>
      <button class="btn-close" onclick="closeLiff()">關閉</button>
    </div>
  </div>

  <!-- 無資格 -->
  <div class="scn" id="scn-no-elig">
    <div class="no-elig-wrap">
      <div class="no-elig-icon" id="no-elig-icon">😢</div>
      <div class="no-elig-title" id="no-elig-title">目前沒有領餐資格</div>
      <div class="no-elig-sub" id="no-elig-sub">下次消費後即可獲得早餐或宵夜資格（7天內有效）。</div>
      <button class="btn-close" onclick="closeLiff()">關閉</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  設定區 — 部署前請填入
// ════════════════════════════════════════════════
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbyH2UnqseghBNE_uaJZYkG9Hrc0WPglrdMnfbQ58zPEfs-RQ1NmwGtnryd0OcYKiJzX/exec';
const LIFF_ID   = '2009772018-xroV1qbk'; // ← 填入領餐 LIFF 的 ID

// ════════════════════════════════════════════════
//  時段定義（台灣時間，以分鐘計）
// ════════════════════════════════════════════════
const SLOTS = {
  breakfast:  { start: 7*60,      end: 10*60+30 },  // 07:00–10:30
  nightsnack: { start: 20*60+30,  end: 21*60+30 }   // 20:30–21:30
};

// ════════════════════════════════════════════════
//  狀態
// ════════════════════════════════════════════════
let lineUID     = null;
let displayName = null;
let selectedMeal = null;
let checkinData  = null;

// ── 取得台灣時間（分鐘數）────────────────────────
function getTWMinutes() {
  const now = new Date();
  // 計算台灣時間
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  const tw  = new Date(utc + 8 * 3600000);
  return tw.getHours() * 60 + tw.getMinutes();
}

function getTWTime() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 3600000);
}

function getCurrentSlot() {
  const m = getTWMinutes();
  if (m >= SLOTS.breakfast.start  && m < SLOTS.breakfast.end)  return 'breakfast';
  if (m >= SLOTS.nightsnack.start && m <= SLOTS.nightsnack.end) return 'nightsnack';
  return null;
}

// ── 即時時鐘 ─────────────────────────────────────
function updateClock() {
  const tw = getTWTime();
  const hh = String(tw.getHours()).padStart(2,'0');
  const mm = String(tw.getMinutes()).padStart(2,'0');
  const ss = String(tw.getSeconds()).padStart(2,'0');
  document.getElementById('liveClock').textContent = `台灣時間 ${hh}:${mm}:${ss}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── 畫面切換 ─────────────────────────────────────
function showScn(id) {
  document.querySelectorAll('.scn').forEach(s => s.classList.remove('active'));
  document.getElementById('scn-' + id).classList.add('active');
}

// ── 鎖定畫面提示 ─────────────────────────────────
function showLocked() {
  const m = getTWMinutes();
  // 標記哪個時段最近
  document.getElementById('slot-breakfast').classList.remove('active-slot');
  document.getElementById('slot-nightsnack').classList.remove('active-slot');

  let tip = '';
  if (m < SLOTS.breakfast.start) {
    // 早餐尚未開始
    const diff = SLOTS.breakfast.start - m;
    tip = `⏰ 早餐時段將於 ${Math.floor(diff/60)}小時${diff%60}分後開始`;
  } else if (m >= SLOTS.breakfast.end && m < SLOTS.nightsnack.start) {
    // 下午空窗
    const diff = SLOTS.nightsnack.start - m;
    const h = Math.floor(diff/60), min = diff%60;
    tip = h > 0
      ? `⏰ 宵夜時段將於 ${h}小時${min}分後開始`
      : `⏰ 宵夜時段將於 ${min}分鐘後開始`;
  } else if (m > SLOTS.nightsnack.end) {
    // 今天結束
    tip = '今日領餐時段已結束，明天早餐時段 07:00 再來唷！';
  }
  document.getElementById('nextSlotTip').textContent = tip;
  showScn('locked');
}

// ── 選餐 ─────────────────────────────────────────
function selectMeal(type) {
  const slot = getCurrentSlot();
  if (type !== slot) {
    alert(type === 'breakfast'
      ? '目前不是早餐時段（07:00–10:30），請在早餐時段內選擇。'
      : '目前不是宵夜時段（20:30–21:30），請在宵夜時段內選擇。');
    return;
  }
  selectedMeal = type;
  document.querySelectorAll('.meal-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + type).classList.add('selected');
  const nextBtn = document.getElementById('btn-next');
  nextBtn.disabled = false;
  nextBtn.classList.replace('grey','green');
}

function goConfirm() {
  if (!selectedMeal) return;
  // 再次驗證時段（防止時間過了還送出）
  if (getCurrentSlot() !== selectedMeal) {
    alert('時段已結束，請重新開啟頁面。');
    location.reload();
    return;
  }
  document.getElementById('confirm-name').textContent = displayName || '（未知）';
  const isBreakfast = selectedMeal === 'breakfast';
  document.getElementById('confirm-icon').textContent  = isBreakfast ? '🌅' : '🌙';
  document.getElementById('confirm-title').textContent = isBreakfast ? '早餐核銷' : '宵夜核銷';

  // 資格到期日
  let detail = '';
  if (checkinData && checkinData.breakfastDate) {
    detail = `資格效期：消費日 ${checkinData.breakfastDate} 起算 7 天`;
  }
  document.getElementById('confirm-detail').textContent = detail;
  showScn('confirm');
}

function goBack() { showScn('choose'); }

// ── 執行核銷 ─────────────────────────────────────
async function doClaim() {
  // 三重防衛：前端再確認時段
  if (getCurrentSlot() !== selectedMeal) {
    alert('時段已結束！請重新開啟頁面。');
    location.reload();
    return;
  }

  showScn('loading');
  try {
    const url = `${GAS_URL}?action=claim_breakfast&lineuid=${encodeURIComponent(lineUID)}&mealType=${selectedMeal}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.status === 'OK') {
      document.getElementById('result-icon').textContent  = '✅';
      document.getElementById('result-title').textContent = selectedMeal === 'breakfast' ? '早餐核銷成功！' : '宵夜核銷成功！';
      document.getElementById('result-title').className   = 'result-title';
      document.getElementById('result-sub').textContent   = '請至櫃台取餐，祝您用餐愉快 🥩';
      showScn('result');
    } else if (data.status === 'NO_ELIGIBILITY' || data.status === 'EXPIRED') {
      document.getElementById('no-elig-icon').textContent  = data.status === 'EXPIRED' ? '⏰' : '😢';
      document.getElementById('no-elig-title').textContent = data.status === 'EXPIRED' ? '資格已過期' : '沒有領餐資格';
      document.getElementById('no-elig-sub').textContent   = data.message;
      showScn('no-elig');
    } else if (data.status === 'ALREADY_CLAIMED_TODAY') {
      document.getElementById('no-elig-icon').textContent  = '🚫';
      document.getElementById('no-elig-title').textContent = '今日已領取過';
      document.getElementById('no-elig-sub').textContent   = data.message;
      showScn('no-elig');
    } else if (data.status === 'WRONG_TIME') {
      document.getElementById('result-icon').textContent  = '⏰';
      document.getElementById('result-title').textContent = '時段錯誤';
      document.getElementById('result-title').className   = 'result-title error';
      document.getElementById('result-sub').textContent   = data.message;
      showScn('result');
    } else {
      document.getElementById('result-icon').textContent  = '❌';
      document.getElementById('result-title').textContent = '核銷失敗';
      document.getElementById('result-title').className   = 'result-title error';
      document.getElementById('result-sub').textContent   = data.message || '請洽櫃台人員協助';
      showScn('result');
    }
  } catch(err) {
    document.getElementById('result-icon').textContent  = '❌';
    document.getElementById('result-title').textContent = '連線失敗';
    document.getElementById('result-title').className   = 'result-title error';
    document.getElementById('result-sub').textContent   = '網路錯誤，請稍後再試或告知店員。';
    showScn('result');
  }
}

function closeLiff() {
  try { liff.closeWindow(); } catch(_) { window.close(); }
}

// ════════════════════════════════════════════════
//  LIFF 初始化
// ════════════════════════════════════════════════
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    lineUID      = profile.userId;
    displayName  = profile.displayName;

    // ── Step 1：前端時段鎖定 ──────────────────────
    const slot = getCurrentSlot();
    if (!slot) {
      showLocked();
      return;
    }

    // ── Step 2：驗證會員資格 ──────────────────────
    const res  = await fetch(`${GAS_URL}?action=member_checkin&lineuid=${encodeURIComponent(lineUID)}`);
    const data = await res.json();
    checkinData = data;

    if (data.status !== 'OK') {
      document.getElementById('no-elig-icon').textContent  = '❌';
      document.getElementById('no-elig-title').textContent = '非有效會員';
      document.getElementById('no-elig-sub').textContent   = '此 LINE 帳號尚未加入會員，請至店內辦理。';
      showScn('no-elig');
      return;
    }

    // ── Step 3：檢查有無早餐資格 ─────────────────
    if (!data.breakfastEligible) {
      const expired = data.breakfastStatus === 'expired';
      document.getElementById('no-elig-icon').textContent  = expired ? '⏰' : '😢';
      document.getElementById('no-elig-title').textContent = expired ? '資格已過期' : '目前沒有領餐資格';
      document.getElementById('no-elig-sub').textContent   = expired
        ? '早餐 / 宵夜資格已超過 7 天期限。下次消費後即可重新獲得。'
        : '下次消費後即可獲得早餐或宵夜資格（7天內有效）。';
      showScn('no-elig');
      return;
    }

    // ── Step 4：進入選餐畫面，預設選中當前時段 ───
    // 依時段顯示/隱藏按鈕
    document.getElementById('btn-breakfast').style.display  = (slot === 'breakfast')  ? 'flex' : 'none';
    document.getElementById('btn-nightsnack').style.display = (slot === 'nightsnack') ? 'flex' : 'none';

    showScn('choose');
    // 自動預選當前時段
    selectMeal(slot);

  } catch(err) {
    document.getElementById('no-elig-icon').textContent  = '❌';
    document.getElementById('no-elig-title').textContent = '初始化失敗';
    document.getElementById('no-elig-sub').textContent   = err.message || '請重新整理或洽店員協助。';
    showScn('no-elig');
  }
}

// ── 每 30 秒重新檢查時段（防止時段結束後仍在頁面上）──
setInterval(() => {
  const currentScn = document.querySelector('.scn.active')?.id;
  if (currentScn === 'scn-choose' || currentScn === 'scn-confirm') {
    if (!getCurrentSlot()) {
      alert('領餐時段已結束，頁面將自動重新整理。');
      location.reload();
    }
  }
}, 30000);

init();
</script>
</body>
</html>
