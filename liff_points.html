<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 - 優惠同步中</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  @keyframes rotate { to { transform: rotate(360deg); } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
  }
  .card { background: #fff; border-radius: 24px; max-width: 380px; width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.25); overflow: hidden; }
  .hdr { background: linear-gradient(135deg, #1B5E20, #2E7D32); padding: 18px 20px; text-align: center; color: #fff; }
  .hdr h2 { font-size: 17px; font-weight: 700; }
  .loading-spinner { width: 36px; height: 36px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: rotate 0.8s linear infinite; margin: 0 auto; }
  .status-panel { width: 100%; text-align: center; padding: 25px 20px; }
  .terms-body { padding: 12px 16px; font-size: 11px; color: #666; line-height: 1.5; border-top: 1px solid #eee; background: #fafafa; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="hdr">
    <h2>無名牛排會員系統</h2>
  </div>

  <div id="scn-options" style="min-height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div id="auto-processing">
      <div class="loading-spinner"></div>
      <p style="margin-top:20px; font-size:17px; color:#007bff; font-weight:bold;">正在同步優惠資訊...</p>
    </div>
  </div>

  <div class="terms-body">
    <p style="font-weight:bold; color:#1B5E20; margin-bottom:4px;">【使用規則簡述】</p>
    <p>• 買1客領1份額度，隔日起10天內有效。</p>
    <p>• 核銷時點幾客扣幾客，每客皆享基準價折抵。</p>
  </div>
</div>

<script>
const VERSION = "18.0." + Math.floor(Date.now() / 1000);
const GAS_URL = "https://script.google.com/macros/s/AKfycbzE9MAmB7PFnnpBsLmiIMn3vRkoGwxCOphnp-t6h73rxwnP8mfyDxpxGV_2gg8KSCRt/exec";
const LIFF_ID = "2004223422-C2DD295";

function getParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  let val = urlParams.get(name);
  if (val) return val;
  const hashParams = new URLSearchParams(window.location.hash.substring(window.location.hash.indexOf('?')));
  return hashParams.get(name);
}

const _sessionKey = getParam('sessionKey');
let _issueQty = parseInt(getParam('issueQty') || getParam('useQty') || getParam('qty') || 0);
let _unitPrice = parseInt(getParam('unitPrice') || getParam('price') || 0);

if (_issueQty <= 0) { _issueQty = 1; }
if (_unitPrice <= 0) { _unitPrice = 399; }
const _baseDisc = Math.round(_unitPrice / 2);

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    
    let hasResponded = false;
    const fallbackTimer = setTimeout(() => {
      if (!hasResponded) { hasResponded = true; renderFallback(profile.userId); }
    }, 5000);

    try {
      const res = await fetch(`${GAS_URL}?action=member_status&uid=${profile.userId}&v=${VERSION}`);
      const status = await res.json();
      hasResponded = true; clearTimeout(fallbackTimer);
      renderOptions(status, profile.userId);
    } catch (err) {
      if (!hasResponded) { hasResponded = true; clearTimeout(fallbackTimer); renderFallback(profile.userId); }
    }
  } catch (err) { renderFallback("unknown"); }
}

function renderOptions(status, uid) {
  const container = document.getElementById('scn-options');
  const _quotaRemain = parseInt(status.halfPriceQuota || 0);
  const _qDisc = parseInt(status.halfPriceDiscount || 0);

  if (_quotaRemain > 0) {
    container.innerHTML = `
      <div class="status-panel">
        <div style="font-size:50px; margin-bottom:10px;">✅</div>
        <h2 style="color:#28a745; margin-bottom:10px; font-size:20px;">已自動套用優惠</h2>
        <div style="font-size:26px; font-weight:900; color:#333; margin:8px 0;">使用 ${_quotaRemain} 份額度</div>
        <div style="display:inline-block; background:#eef9f0; padding:8px 20px; border-radius:30px; color:#28a745; font-weight:bold; font-size:18px;">每份現折 $${_qDisc} 元</div>
        <p style="font-size:15px; color:#333; font-weight:bold; margin-top:12px;">✨ 剩餘總額度：${_quotaRemain} 份</p>
        <p style="font-size:12px; color:#666; margin-top:10px;">正在同步至 POS 機，請稍候...</p>
      </div>
    `;
    submitToGas(uid, 'quota_redeem', _quotaRemain, _qDisc);
  } else {
    renderFallback(uid);
  }
}

function renderFallback(uid) {
  const container = document.getElementById('scn-options');
  container.innerHTML = `
    <div class="status-panel">
      <div style="font-size:50px; margin-bottom:10px;">🎁</div>
      <h2 style="color:#856404; margin-bottom:10px; font-size:20px;">已自動領取優惠</h2>
      <div style="font-size:26px; font-weight:900; color:#333; margin:8px 0;">獲得 ${_issueQty} 份額度</div>
      <div style="display:inline-block; background:#fff9ee; padding:8px 20px; border-radius:30px; color:#d39e00; font-weight:bold; font-size:18px;">下次每份抵 $${_baseDisc} 元</div>
      <p style="font-size:15px; color:#dc3545; font-weight:bold; margin-top:12px;">⏰ 隔日起 10 天內有效</p>
      <p style="font-size:12px; color:#666; margin-top:10px;">正在同步至 POS 機，請稍候...</p>
    </div>
  `;
  submitToGas(uid, 'half_issue', _issueQty, _baseDisc);
}

async function submitToGas(uid, choice, qty, disc) {
  try {
    // 強制帶入 sessionKey，確保 POS 能對應到
    const finalUrl = `${GAS_URL}?action=submit_promo&uid=${uid}&choice=${choice}&qty=${qty}&disc=${disc}&sessionKey=${encodeURIComponent(_sessionKey || '')}&v=${VERSION}&t=${Date.now()}`;
    
    // 使用同步 fetch 確保指令發出
    await fetch(finalUrl, { mode: 'no-cors' });
    
    // 額外使用 Image Beacon 作為雙重保險
    const img = new Image();
    img.src = finalUrl;
    
    // 延長等待時間，確保 POS 輪詢到結果
    setTimeout(() => { liff.closeWindow(); }, 5000);
  } catch (err) { 
    console.error(err);
    setTimeout(() => { liff.closeWindow(); }, 3000);
  }
}

initLiff();
</script>
</body>
</html>
