<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 20px;
}
.card { background: #fff; border-radius: 20px; max-width: 360px; width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18); overflow: hidden; }
.hdr { background: linear-gradient(135deg, #1B5E20, #2E7D32);
  padding: 22px 20px 18px; text-align: center; color: #fff; }
.hdr-icon { font-size: 34px; margin-bottom: 5px; }
.hdr h2 { font-size: 17px; font-weight: 700; margin: 0 0 2px; }
.hdr p  { font-size: 12px; opacity: 0.8; margin: 0; }
.scn { display: none; flex-direction: column; padding-bottom: 24px; }
.scn.active { display: flex; }
.loading { color: #888; font-size: 14px; text-align: center; padding: 32px 20px; }
.spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #2E7D32;
  border-radius: 50%; animation: rotate .7s linear infinite; margin: 0 auto 10px; }
@keyframes rotate { to { transform: rotate(360deg); } }
.opt { display: flex; align-items: flex-start; gap: 12px; padding: 14px;
  border-radius: 14px; border: 2px solid #e2e8f0; background: #fff;
  cursor: pointer; text-align: left; width: 100%; margin-bottom: 10px; transition: all .15s; }
.opt.sel  { border-color: #15803d; background: #f0fdf4; }
.opt.half-opt { border-color: #7C3AED; background: #F5F3FF; }
.opt.half-opt.sel { border-color: #5B21B6; background: #EDE9FE; }
.opt-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.opt-title { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 3px; }
.opt.sel .opt-title { color: #15803d; }
.opt-sub   { font-size: 12px; color: #64748b; line-height: 1.5; }
.opt-check { margin-left: auto; flex-shrink: 0; font-size: 18px; display: none; }
.btn-confirm { display: block; width: 100%; padding: 15px; border-radius: 12px;
  border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s; }
.btn-confirm.active { background: #15803d; color: #fff; }
.btn-confirm.disabled { background: #cbd5e1; color: #fff; cursor: not-allowed; }
.done-wrap { padding: 40px 24px 24px; text-align: center; display: flex; flex-direction: column; align-items: center; }
.done-icon  { font-size: 50px; margin-bottom: 14px; }
.done-title { font-size: 19px; font-weight: 800; color: #1B5E20; margin-bottom: 8px; }
.done-sub   { font-size: 13px; color: #888; line-height: 1.6; }
.btn-main { display: block; width: calc(100% - 40px); margin: 16px 20px 0; padding: 15px;
  background: #2E7D32; color: #fff; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; }
</style>
</head>
<body>
<div class="card" id="app">
  <div id="global-loading" class="loading">
    <div class="spinner"></div>
    <p>正在讀取資料…</p>
  </div>

  <!-- 優惠選擇畫面 -->
  <div class="scn" id="co-promo">
    <div class="hdr">
      <div class="hdr-icon">🎫</div>
      <h2>請選擇本次優惠</h2>
      <p id="co-promo-sub">偵測到可用優惠！</p>
    </div>
    <div style="padding:20px 20px 0;" id="promo-options-container">
      <!-- 動態插入選項 -->
    </div>
    <div style="padding:0 20px 20px;">
      <button id="btn-confirm" class="btn-confirm disabled" onclick="confirmPromo()">請選擇一個選項</button>
    </div>
  </div>

  <!-- 送出中畫面 -->
  <div class="scn" id="co-sending">
    <div class="done-wrap">
      <div class="spinner"></div>
      <div class="done-title">正在送出選擇…</div>
      <p class="done-sub">請稍候，正在同步後台資料</p>
    </div>
  </div>

  <!-- 等待店員確認畫面 -->
  <div class="scn" id="co-waiting">
    <div class="done-wrap">
      <div class="done-icon">🥩</div>
      <div class="done-title">請直接結帳</div>
      <p class="done-sub" id="co-wait-sub" style="white-space: pre-line;">請等候店員確認</p>
      <button class="btn-main" onclick="liff.closeWindow()">關閉視窗</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzE9MAmB7PFnnpBsLmiIMn3vRkoGwxCOphnp-t6h73rxwnP8mfyDxpxGV_2gg8KSCRt/exec";
const LIFF_ID = "2004223422-C2DD295";

let profile = null;
let sessionKey = new URLSearchParams(window.location.search).get("sessionKey") || "";
let _issueQty = parseInt(new URLSearchParams(window.location.search).get("issueQty") || "1");
let promoSelected = null;

async function init() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  profile = await liff.getProfile();
  await fetchMemberStatus();
}

async function fetchMemberStatus() {
  try {
    const res = await fetch(`${GAS_URL}?action=member_status&lineuid=${encodeURIComponent(profile.userId)}&t=${Date.now()}`);
    const data = await res.json();
    
    if (data.status === "OK") {
      const quota = parseInt(data.halfPriceQuota || 0);
      const hasCoupon = (data.halfCoupon && (data.halfCoupon.status === 'active' || data.halfCoupon.status === 'issued'));
      
      // 核心邏輯：判斷是否有「核銷類」優惠
      if (quota > 0 || hasCoupon) {
        buildOptions(data, quota, hasCoupon);
        goScreen("co-promo");
      } else {
        // 無優惠，靜默送出 skip 並直接結帳
        await silentSkip();
        directCheckout("目前無可用優惠，請直接結帳");
      }
    } else {
      directCheckout("無法取得資訊，請直接結帳");
    }
  } catch (err) {
    directCheckout("網路錯誤，請直接結帳");
  }
}

async function silentSkip() {
  try {
    const params = new URLSearchParams({
      action: 'set_decision',
      sessionKey: sessionKey,
      lineuid: profile.userId,
      promoChoice: 'skip',
      decision: 'skip',
      t: Date.now()
    });
    await fetch(`${GAS_URL}?${params.toString()}`);
  } catch (e) {}
}

function buildOptions(data, quota, hasCoupon) {
  const container = document.getElementById("promo-options-container");
  container.innerHTML = "";
  
  if (quota > 0) {
    container.appendChild(makeOpt({
      key: 'quota_redeem',
      icon: '🥩',
      title: '使用半價額度',
      sub: `帳戶剩餘：${quota} 份\n本次將使用 ${Math.min(_issueQty, quota)} 份`,
      cls: 'half-opt'
    }));
  }

  if (hasCoupon) {
    container.appendChild(makeOpt({
      key: 'half_redeem',
      icon: '🎫',
      title: '核銷第二件半價券',
      sub: '使用帳戶內現有的優惠券',
      cls: 'half-opt'
    }));
  }

  // 即使有優惠，也提供一個「不使用」的選項
  container.appendChild(makeOpt({
    key: 'skip',
    icon: '⏭️',
    title: '不使用優惠',
    sub: '直接按原價結帳',
    cls: ''
  }));

  document.getElementById("global-loading").style.display = "none";
}

function makeOpt({ key, icon, title, sub, cls }) {
  const div = document.createElement("div");
  div.className = "opt " + cls;
  div.id = "opt-" + key;
  div.onclick = () => selectPromo(key);
  div.innerHTML = `
    <div class="opt-icon">${icon}</div>
    <div style="flex:1;">
      <div class="opt-title">${title}</div>
      <div class="opt-sub">${sub.replace(/\n/g, '<br>')}</div>
    </div>
    <div class="opt-check" id="chk-${key}">✅</div>
  `;
  return div;
}

function selectPromo(key) {
  if (promoSelected === key) {
    confirmPromo();
    return;
  }
  promoSelected = key;
  document.querySelectorAll(".opt").forEach(el => el.classList.remove("sel"));
  document.querySelectorAll(".opt-check").forEach(el => el.style.display = "none");
  
  document.getElementById("opt-" + key).classList.add("sel");
  document.getElementById("chk-" + key).style.display = "block";
  
  const btn = document.getElementById("btn-confirm");
  btn.className = "btn-confirm active";
  btn.textContent = "✅ 確認選擇";
}

async function confirmPromo() {
  if (!promoSelected) return;
  goScreen("co-sending");
  
  try {
    const params = new URLSearchParams({
      action: 'set_decision',
      sessionKey: sessionKey,
      lineuid: profile.userId,
      promoChoice: promoSelected,
      decision: (promoSelected === 'skip') ? 'skip' : 'use',
      t: Date.now()
    });
    
    const res = await fetch(`${GAS_URL}?${params.toString()}`);
    const data = await res.json();
    
    if (data.status === "OK") {
      const msg = (promoSelected === 'skip') ? "已確認不使用優惠" : "✅ 優惠已成功套用！";
      directCheckout(msg);
    } else {
      directCheckout("處理失敗，請洽店員手動處理");
    }
  } catch (err) {
    directCheckout("網路錯誤，請洽店員");
  }
}

function directCheckout(msg) {
  document.getElementById("co-wait-sub").textContent = msg;
  goScreen("co-waiting");
  document.getElementById("global-loading").style.display = "none";
}

function goScreen(id) {
  document.querySelectorAll(".scn").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

init().catch(err => directCheckout("啟動失敗：" + err.message));
</script>
</body>
</html>
