<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 - 優惠同步中</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  @keyframes rotate { to { transform: rotate(360deg); } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
  }
  .card { background: #fff; border-radius: 24px; max-width: 380px; width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.25); overflow: hidden; }
  .hdr { background: linear-gradient(135deg, #1B5E20, #2E7D32); padding: 18px 20px; text-align: center; color: #fff; }
  .hdr h2 { font-size: 17px; font-weight: 700; }
  .status-panel { width: 100%; text-align: center; padding: 25px 20px; }
  .btn-close { margin-top: 20px; padding: 12px 30px; background: #28a745; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; display: none; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="hdr"><h2>無名牛排會員系統</h2></div>
  <div id="scn-options" style="min-height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <div id="auto-processing">
      <div style="width:36px; height:36px; border:4px solid #f3f3f3; border-top:4px solid #007bff; border-radius:50%; animation:rotate 0.8s linear infinite; margin:0 auto;"></div>
      <p style="margin-top:20px; font-size:17px; color:#007bff; font-weight:bold;">正在同步優惠資訊...</p>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzE9MAmB7PFnnpBsLmiIMn3vRkoGwxCOphnp-t6h73rxwnP8mfyDxpxGV_2gg8KSCRt/exec";
const LIFF_ID = "2004223422-C2DD295";

function getParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name) || new URLSearchParams(window.location.hash.split('?')[1]).get(name);
}

const _sessionKey = getParam('sessionKey');
const _issueQty = parseInt(getParam('issueQty') || 1);
const _unitPrice = parseInt(getParam('unitPrice') || 399);
const _baseDisc = Math.round(_unitPrice / 2);

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    
    const res = await fetch(`${GAS_URL}?action=member_status&uid=${profile.userId}`);
    const status = await res.json();
    renderOptions(status, profile.userId);
  } catch (err) { renderFallback("unknown"); }
}

function renderOptions(status, uid) {
  const container = document.getElementById('scn-options');
  const _quotaRemain = parseInt(status.halfPriceQuota || 0);
  const _qDisc = parseInt(status.halfPriceDiscount || 0);

  if (_quotaRemain > 0) {
    container.innerHTML = `
      <div class="status-panel">
        <div style="font-size:50px;">✅</div>
        <h2 style="color:#28a745; margin:10px 0;">已自動套用優惠</h2>
        <div style="font-size:24px; font-weight:900;">使用 ${_quotaRemain} 份額度</div>
        <p style="color:#666;">✨ 剩餘總額度：${_quotaRemain} 份</p>
        <button id="closeBtn" class="btn-close" onclick="liff.closeWindow()">完成並關閉</button>
      </div>
    `;
    submitToGas(uid, 'quota_redeem', _quotaRemain, _qDisc);
  } else {
    renderFallback(uid);
  }
}

function renderFallback(uid) {
  const container = document.getElementById('scn-options');
  container.innerHTML = `
    <div class="status-panel">
      <div style="font-size:50px;">🎁</div>
      <h2 style="color:#856404; margin:10px 0;">已自動領取優惠</h2>
      <div style="font-size:24px; font-weight:900;">獲得 ${_issueQty} 份額度</div>
      <p style="color:#dc3545; font-weight:bold;">⏰ 隔日起 10 天內有效</p>
      <button id="closeBtn" class="btn-close" onclick="liff.closeWindow()">完成並關閉</button>
    </div>
  `;
  submitToGas(uid, 'half_issue', _issueQty, _baseDisc);
}

async function submitToGas(uid, choice, qty, disc) {
  const finalUrl = `${GAS_URL}?action=submit_promo&uid=${uid}&choice=${choice}&qty=${qty}&disc=${disc}&sessionKey=${encodeURIComponent(_sessionKey || '')}&t=${Date.now()}`;
  fetch(finalUrl, { mode: 'no-cors' });
  new Image().src = finalUrl;
  setTimeout(() => { 
    document.getElementById('closeBtn').style.display = 'inline-block';
    setTimeout(() => liff.closeWindow(), 3000);
  }, 1500);
}

initLiff();
</script>
</body>
</html>
