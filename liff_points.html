<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 - 會員優惠</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  @keyframes rotate { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
  }
  .card { background:#fff; border-radius:24px; max-width:380px; width:100%; box-shadow:0 15px 40px rgba(0,0,0,0.25); overflow:hidden; }
  .hdr { background:linear-gradient(135deg,#1B5E20,#2E7D32); padding:16px 20px; text-align:center; color:#fff; }
  .hdr h2 { font-size:17px; font-weight:700; }
  .hdr p  { font-size:12px; opacity:0.85; margin-top:2px; }
  .body { padding:20px 18px 22px; animation:fadeIn 0.35s ease; }
  /* 會員資訊列 */
  .info-row { display:flex; gap:8px; margin-bottom:14px; }
  .info-box {
    flex:1; background:#f8fafc; border:1.5px solid #e2e8f0;
    border-radius:14px; padding:10px 8px; text-align:center;
  }
  .info-box .val { font-size:22px; font-weight:900; color:#1e293b; }
  .info-box .lbl { font-size:11px; color:#64748b; margin-top:2px; }
  /* 選項按鈕 */
  .opt-btn {
    width:100%; border:none; border-radius:14px; padding:14px 16px;
    margin-bottom:10px; cursor:pointer; text-align:left;
    display:flex; align-items:center; gap:12px;
    font-family:inherit; transition:transform 0.1s, box-shadow 0.1s;
    animation:fadeIn 0.4s ease;
  }
  .opt-btn:active { transform:scale(0.97); }
  .opt-btn .ico { font-size:28px; flex-shrink:0; }
  .opt-btn .txt { flex:1; }
  .opt-btn .txt .name { font-size:15px; font-weight:800; }
  .opt-btn .txt .desc { font-size:12px; margin-top:2px; opacity:0.8; }
  .opt-btn.green  { background:#d4edda; color:#155724; box-shadow:0 3px 12px rgba(34,197,94,0.25); }
  .opt-btn.blue   { background:#cfe2ff; color:#084298; box-shadow:0 3px 12px rgba(99,102,241,0.2); }
  .opt-btn.amber  { background:#fff3cd; color:#664d03; box-shadow:0 3px 12px rgba(251,191,36,0.2); }
  .opt-btn.slate  { background:#f1f5f9; color:#475569; }
  .opt-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  /* 結果畫面 */
  .result { text-align:center; padding:10px 0 4px; animation:fadeIn 0.4s ease; }
  .result .r-icon { font-size:54px; margin-bottom:8px; }
  .result .r-title { font-size:20px; font-weight:900; margin-bottom:6px; }
  .result .r-badge { display:inline-block; font-size:16px; font-weight:800; padding:7px 18px; border-radius:50px; margin-bottom:10px; }
  .result .r-note  { font-size:13px; color:#666; line-height:1.6; }
  /* 轉圈 */
  .spinner { width:32px; height:32px; border:4px solid #f3f3f3; border-top:4px solid #2E7D32; border-radius:50%; animation:rotate 0.8s linear infinite; margin:0 auto 12px; }
  .loading-text { font-size:14px; color:#2E7D32; font-weight:700; text-align:center; }
  /* 分隔線 */
  .divider { border:none; border-top:1px solid #e2e8f0; margin:10px 0; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="hdr">
    <h2>無名牛排 會員優惠</h2>
    <p>請選擇您要使用的優惠</p>
  </div>
  <div class="body" id="scn">
    <div class="spinner"></div>
    <p class="loading-text">正在讀取會員資料…</p>
  </div>
</div>

<script>
// ─── 設定 ────────────────────────────────────────
var GAS_URL  = "https://script.google.com/macros/s/AKfycbzE9MAmB7PFnnpBsLmiIMn3vRkoGwxCOphnp-t6h73rxwnP8mfyDxpxGV_2gg8KSCRt/exec";
var LIFF_ID  = "2004223422-C2DD295";
var EXP_DAYS = 10;
// ─────────────────────────────────────────────────

function getParam(name) {
  var u = new URLSearchParams(window.location.search);
  return u.get(name) || new URLSearchParams((window.location.hash.split('?')[1]||'')).get(name);
}
var _sessionKey = getParam('sessionKey') || '';
var _issueQty   = Math.max(1, parseInt(getParam('issueQty') || 1));
var _unitPrice  = parseInt(getParam('unitPrice') || 399);
var _baseDisc   = Math.round(_unitPrice / 2);

var _uid = '';  // 全域保存

// ─── 安全 fetch（逾時 + 非 JSON 防爆）─────────────
async function safeGet(url) {
  var ctrl = new AbortController();
  var t = setTimeout(function(){ ctrl.abort(); }, 7000);
  try {
    var res  = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    var text = await res.text();
    return JSON.parse(text);
  } catch(e) { return null; }
  finally { clearTimeout(t); }
}

// ─── 送出選擇到 GAS ──────────────────────────────
async function submitChoice(choice, decision) {
  decision = decision || 'use';
  var url = GAS_URL
    + '?action=submit_promo'
    + '&uid='        + encodeURIComponent(_uid)
    + '&lineuid='    + encodeURIComponent(_uid)
    + '&choice='     + encodeURIComponent(choice)
    + '&decision='   + encodeURIComponent(decision)
    + '&qty='        + _issueQty
    + '&disc='       + _baseDisc
    + '&sessionKey=' + encodeURIComponent(_sessionKey)
    + '&t='          + Date.now();
  try { await fetch(url, { mode:'no-cors' }); } catch(_) {}
  try { new Image().src = url; } catch(_) {}
}

function autoClose(ms) {
  setTimeout(function(){ try { liff.closeWindow(); } catch(_) {} }, ms||3500);
}

// ─── 顯示結果畫面（按鈕後） ─────────────────────
function showResult(icon, titleColor, title, badgeBg, badgeColor, badge, note) {
  document.getElementById('scn').innerHTML =
    '<div class="result">'
    + '<div class="r-icon">' + icon + '</div>'
    + '<div class="r-title" style="color:' + titleColor + '">' + title + '</div>'
    + '<div class="r-badge" style="background:' + badgeBg + ';color:' + badgeColor + '">' + badge + '</div>'
    + (note ? '<div class="r-note">' + note + '</div>' : '')
    + '<div style="margin-top:14px;font-size:12px;color:#94a3b8;">視窗將自動關閉…</div>'
    + '</div>';
}

// ─── 禁用所有按鈕（防止重複點擊） ───────────────
function lockBtns() {
  var btns = document.querySelectorAll('.opt-btn');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
}

// ─── 主畫面：顯示選項讓客人按 ────────────────────
function renderOptions(quota, points, threshold, discount) {
  var need   = _issueQty;
  var canUse = quota >= need;    // 額度足夠可核消
  var canTopUp = quota > 0 && quota < need; // 有但不夠
  var canRedeem = points >= threshold && threshold > 0; // 點數可折抵

  var html = '';

  // ── 會員資訊列 ──
  html += '<div class="info-row">'
    + '<div class="info-box"><div class="val">' + quota + '</div><div class="lbl">半價券額度</div></div>'
    + '<div class="info-box"><div class="val">' + points + '</div><div class="lbl">集點點數</div></div>'
    + '<div class="info-box"><div class="val">' + need + '</div><div class="lbl">本次份數</div></div>'
    + '</div>';

  // ── 選項 A：核消半價券 ──
  if (canUse) {
    var remain = quota - need;
    html += '<button class="opt-btn green" onclick="onChooseQuota()">'
      + '<span class="ico">✅</span>'
      + '<span class="txt">'
      + '<div class="name">使用半價券（核消 ' + need + ' 份）</div>'
      + '<div class="desc">帳戶剩餘 ' + remain + ' 份 · 第二件半價折抵</div>'
      + '</span></button>';
  } else if (canTopUp) {
    var topUp = need - quota;
    html += '<button class="opt-btn green" onclick="onChooseQuota()">'
      + '<span class="ico">🔄</span>'
      + '<span class="txt">'
      + '<div class="name">補發並核消（不足差額自動補發）</div>'
      + '<div class="desc">現有 ' + quota + ' 份，補發 ' + topUp + ' 份後核消 ' + need + ' 份</div>'
      + '</span></button>';
  } else {
    // 沒有額度 → 領取
    html += '<button class="opt-btn amber" onclick="onChooseIssue()">'
      + '<span class="ico">🎁</span>'
      + '<span class="txt">'
      + '<div class="name">領取第二件半價券（' + need + ' 份）</div>'
      + '<div class="desc">⏰ 明日起 ' + EXP_DAYS + ' 天內有效</div>'
      + '</span></button>';
  }

  // ── 選項 B：點數折抵 ──
  if (canRedeem) {
    html += '<button class="opt-btn blue" onclick="onChooseRedeem()">'
      + '<span class="ico">⭐</span>'
      + '<span class="txt">'
      + '<div class="name">兌換點數折抵 -$' + discount + '</div>'
      + '<div class="desc">使用 ' + threshold + ' 點（現有 ' + points + ' 點）</div>'
      + '</span></button>';
  }

  html += '<hr class="divider">';

  // ── 選項 C：只集點 ──
  html += '<button class="opt-btn slate" onclick="onChoosePoints()">'
    + '<span class="ico">📌</span>'
    + '<span class="txt">'
    + '<div class="name">只集點，不使用優惠</div>'
    + '<div class="desc">本次僅累積點數，優惠留著下次用</div>'
    + '</span></button>';

  document.getElementById('scn').innerHTML = html;
}

// ─── 各按鈕 handler ───────────────────────────────
async function onChooseQuota() {
  lockBtns();
  var quota = window._curQuota || 0;
  var need  = _issueQty;
  // 補發差額
  if (quota > 0 && quota < need) {
    var topUp = need - quota;
    var topUrl = GAS_URL + '?action=issue_quota&uid=' + encodeURIComponent(_uid) + '&lineuid=' + encodeURIComponent(_uid) + '&qty=' + topUp + '&_t=' + Date.now();
    try { await fetch(topUrl, { mode:'no-cors' }); } catch(_) {}
    try { new Image().src = topUrl; } catch(_) {}
  }
  await submitChoice('quota_redeem', 'use');
  showResult('✅','#1a7c2a','半價券核消成功','#d4edda','#155724','核消 ' + need + ' 份','優惠已套用，系統將自動完成結帳');
  autoClose();
}

async function onChooseIssue() {
  lockBtns();
  await submitChoice('half_issue', 'use');
  showResult('🎁','#7c4a00','已領取半價券額度','#fff3cd','#664d03','獲得 ' + _issueQty + ' 份','⏰ 明日起 ' + EXP_DAYS + ' 天內有效<br>下次到店出示即可折抵');
  autoClose();
}

async function onChooseRedeem() {
  lockBtns();
  await submitChoice('redeem', 'redeem');
  showResult('💰','#0a4fa3','點數折抵確認中','#cfe2ff','#084298','兌換點數折抵','系統將自動完成結帳');
  autoClose();
}

async function onChoosePoints() {
  lockBtns();
  await submitChoice('points', 'skip');
  showResult('📌','#374151','已集點','#f1f5f9','#374151','只集點不使用優惠','感謝消費，點數已記錄！');
  autoClose();
}

// ─── LIFF 初始化 ─────────────────────────────────
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    var profile = await liff.getProfile();
    _uid = profile.userId;

    // 取會員狀態
    var statusUrl = GAS_URL
      + '?action=member_status'
      + '&uid='     + encodeURIComponent(_uid)
      + '&lineuid=' + encodeURIComponent(_uid)
      + '&_t='      + Date.now();
    var status = await safeGet(statusUrl) || {};

    var quota     = parseInt(status.halfPriceQuota    || 0);
    var points    = parseInt(status.points            || status.totalPoints || 0);
    var threshold = parseInt(status.redeemThreshold   || localStorage && localStorage.getItem && localStorage.getItem('pos_points_redeem_threshold') || 5);
    var discount  = parseInt(status.redeemDiscount    || 50);

    window._curQuota = quota;

    renderOptions(quota, points, threshold, discount);

  } catch(err) {
    console.error('[LIFF] 初始化失敗:', err);
    // LIFF 失敗 → 送出 unknown 讓 POS 倒數後自動略過
    document.getElementById('scn').innerHTML =
      '<div class="result">'
      + '<div class="r-icon">⚠️</div>'
      + '<div class="r-title" style="color:#856404">無法取得會員資料</div>'
      + '<div class="r-badge" style="background:#fff3cd;color:#664d03">請告知店員</div>'
      + '<div class="r-note">系統將在 15 秒後自動繼續結帳</div>'
      + '</div>';
    try { await fetch(GAS_URL + '?action=submit_promo&uid=unknown&lineuid=unknown&choice=points&decision=skip&sessionKey=' + encodeURIComponent(_sessionKey) + '&t=' + Date.now(), { mode:'no-cors' }); } catch(_) {}
  }
}

initLiff();
</script>
</body>
</html>
