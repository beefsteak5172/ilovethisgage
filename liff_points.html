<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 - 優惠同步中</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  @keyframes rotate { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px;
  }
  .card { background: #fff; border-radius: 24px; max-width: 380px; width: 100%; box-shadow: 0 15px 40px rgba(0,0,0,0.25); overflow: hidden; animation: fadeIn 0.4s ease; }
  .hdr { background: linear-gradient(135deg, #1B5E20, #2E7D32); padding: 18px 20px; text-align: center; color: #fff; }
  .hdr h2 { font-size: 17px; font-weight: 700; }
  .body { padding: 28px 24px 24px; text-align: center; }
  .icon { font-size: 52px; margin-bottom: 10px; }
  .title { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
  .badge { display: inline-block; font-size: 22px; font-weight: 900; padding: 8px 20px; border-radius: 50px; margin: 10px 0; }
  .detail { font-size: 13px; color: #666; line-height: 1.7; margin-top: 6px; }
  .tag { font-size: 13px; font-weight: 700; margin-top: 8px; }
  .spinner { width:36px; height:36px; border:4px solid #f3f3f3; border-top:4px solid #2E7D32; border-radius:50%; animation:rotate 0.8s linear infinite; margin:0 auto 16px; }
  .loading-text { font-size:15px; color:#2E7D32; font-weight:700; }
</style>
</head>
<body>
<div class="card" id="app">
  <div class="hdr"><h2>無名牛排會員優惠系統</h2></div>
  <div class="body" id="scn">
    <div class="spinner"></div>
    <p class="loading-text">正在讀取會員資料…</p>
  </div>
</div>
<script>
const GAS_URL  = "https://script.google.com/macros/s/AKfycbzE9MAmB7PFnnpBsLmiIMn3vRkoGwxCOphnp-t6h73rxwnP8mfyDxpxGV_2gg8KSCRt/exec";
const LIFF_ID  = "2004223422-C2DD295";
const EXP_DAYS = 10;

function getParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name) || new URLSearchParams((window.location.hash.split('?')[1] || '')).get(name);
}
const _sessionKey = getParam('sessionKey') || '';
const _issueQty   = Math.max(1, parseInt(getParam('issueQty') || 1));
const _unitPrice  = parseInt(getParam('unitPrice') || 399);
const _baseDisc   = Math.round(_unitPrice / 2);

function setHtml(html) { document.getElementById('scn').innerHTML = html; }
function showLoading(msg) { setHtml(`<div class="spinner"></div><p class="loading-text">${msg}</p>`); }
function showResult({ icon, titleColor, title, badgeBg, badgeColor, badge, details, tag, tagColor }) {
  setHtml(`
    <div class="icon">${icon}</div>
    <div class="title" style="color:${titleColor}">${title}</div>
    <div class="badge" style="background:${badgeBg};color:${badgeColor}">${badge}</div>
    ${details ? `<div class="detail">${details}</div>` : ''}
    ${tag ? `<div class="tag" style="color:${tagColor||'#dc3545'}">${tag}</div>` : ''}
  `);
}

// ★ 帶逾時 + 安全 JSON parse（GAS 有時回 HTML 錯誤頁）
async function safeGet(url, timeoutMs) {
  timeoutMs = timeoutMs || 7000;
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, timeoutMs);
  try {
    var res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    var text = await res.text();
    return JSON.parse(text);
  } catch(e) {
    console.warn('[safeGet] 失敗:', e.message, url);
    return null;
  } finally {
    clearTimeout(timer);
  }
}

// ★ 送出決定：uid + lineuid 雙參數，兼容 GAS 新舊版本
async function submitDecision(uid, choice, qty, disc, extra) {
  var params = 'action=submit_promo'
    + '&uid='       + encodeURIComponent(uid)
    + '&lineuid='   + encodeURIComponent(uid)
    + '&choice='    + encodeURIComponent(choice)
    + '&qty='       + qty
    + '&disc='      + disc
    + '&sessionKey='+ encodeURIComponent(_sessionKey)
    + '&t='         + Date.now();
  if (extra) { Object.keys(extra).forEach(function(k){ params += '&' + k + '=' + encodeURIComponent(extra[k]); }); }
  var url = GAS_URL + '?' + params;
  try { await fetch(url, { mode: 'no-cors' }); } catch(_) {}
  try { new Image().src = url; } catch(_) {}
  console.log('[submitDecision]', choice, 'uid=', uid.slice(-6));
}

async function issueQuota(uid, qty) {
  var url = GAS_URL + '?action=issue_quota&uid=' + encodeURIComponent(uid) + '&lineuid=' + encodeURIComponent(uid) + '&qty=' + qty + '&_t=' + Date.now();
  try { await fetch(url, { mode: 'no-cors' }); } catch(_) {}
  try { new Image().src = url; } catch(_) {}
}

function autoClose(delay) {
  delay = delay || 3500;
  setTimeout(function(){ try { liff.closeWindow(); } catch(_) {} }, delay);
}

async function run(uid) {
  showLoading('正在檢查半價券額度…');

  // ★ uid 和 lineuid 兩個參數都帶，無論 GAS 哪個版本都能讀到
  var statusUrl = GAS_URL
    + '?action=member_status'
    + '&uid='     + encodeURIComponent(uid)
    + '&lineuid=' + encodeURIComponent(uid)
    + '&_t='      + Date.now();

  var status = await safeGet(statusUrl);
  // safeGet 回 null 或 GAS 回 error → 預設 quota=0，走「領取」流程
  if (!status || status.status === 'ERROR') status = {};

  var quota = parseInt(status.halfPriceQuota || 0);
  var qDisc = parseInt(status.halfPriceDiscount || _baseDisc);
  var need  = _issueQty;

  console.log('[LIFF] uid=', uid.slice(-6), 'quota=', quota, 'need=', need);

  // A. 額度足夠 → 核消（多的留帳戶）
  if (quota >= need) {
    var remain = quota - need;
    showResult({
      icon: '✅', titleColor: '#1a7c2a', title: '半價券核消成功',
      badgeBg: '#d4edda', badgeColor: '#155724', badge: '本次使用 ' + need + ' 份',
      details: remain > 0 ? '✨ 帳戶剩餘：<b>' + remain + '</b> 份' : '✨ 本次剛好全部使用',
      tag: '優惠已套用，稍後自動結帳', tagColor: '#1a7c2a'
    });
    await submitDecision(uid, 'quota_redeem', need, qDisc, { useQty: need });

  // B. 有額度但不夠 → 補發差額再核消
  } else if (quota > 0 && quota < need) {
    var topUp = need - quota;
    showLoading('額度不足，正在補發 ' + topUp + ' 份…');
    await issueQuota(uid, topUp);
    showResult({
      icon: '🔄', titleColor: '#0a4fa3', title: '已補發並核消',
      badgeBg: '#cfe2ff', badgeColor: '#084298', badge: '補發 ' + topUp + ' 份 ＋ 核消 ' + need + ' 份',
      details: '原有額度：' + quota + ' 份　補發：' + topUp + ' 份<br>本次使用：' + need + ' 份，帳戶剩餘：0 份',
      tag: '優惠已套用，稍後自動結帳', tagColor: '#0a4fa3'
    });
    await submitDecision(uid, 'quota_redeem', need, qDisc, { useQty: need, topUp: topUp });

  // C. 沒有額度 → 領取
  } else {
    showResult({
      icon: '🎁', titleColor: '#7c4a00', title: '已領取半價券額度',
      badgeBg: '#fff3cd', badgeColor: '#664d03', badge: '獲得 ' + need + ' 份額度',
      details: '下次到店出示即可折抵',
      tag: '⏰ 明日起 ' + EXP_DAYS + ' 天內有效', tagColor: '#c0392b'
    });
    await submitDecision(uid, 'half_issue', need, _baseDisc);
  }

  autoClose();
}

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    var profile = await liff.getProfile();
    await run(profile.userId);
  } catch(err) {
    console.error('[LIFF init error]', err);
    // LIFF 初始化失敗 → 仍送出 unknown 讓 POS 15 秒後自動略過結帳
    showResult({
      icon: '⚠️', titleColor: '#856404', title: '無法取得會員資料',
      badgeBg: '#fff3cd', badgeColor: '#664d03', badge: '本次不套用優惠',
      tag: '請告知店員，系統將自動繼續結帳', tagColor: '#856404'
    });
    await submitDecision('unknown', 'half_issue', _issueQty, _baseDisc);
    autoClose();
  }
}

initLiff();
</script>
</body>
</html>
