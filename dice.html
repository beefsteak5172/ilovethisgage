<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>骰子每日挑戰</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js" defer></script>
  <style>
    @font-face {
      font-family: 'Pixel';
      src: url('https://cdn.jsdelivr.net/gh/wbox/b2-plus-show-posts-in-same-tag@5.2.1/asset/font/PressStart2P-Regular.ttf') format('truetype');
    }
    :root {
      --primary: #4a6cf7;
      --secondary: #10b981;
      --jackpot: #ff416c;
      --bg-color: #1e293b;
      --dice-size: clamp(70px, 15vw, 100px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }

    body {
      background-color: #111; color: #f8fafc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden; width: 100vw; height: 100vh;
      position: fixed; display: flex; align-items: center; justify-content: center;
    }

    /* ── 背景影片 ── */
    .video-background {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; overflow: hidden; pointer-events: none;
      background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4e 25%, #0d2137 50%, #1a1a4e 75%, #0a0a2a 100%);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .video-background video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; transform: translateX(-50%) translateY(-50%); object-fit: cover; }
    .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,42,0.72); }

    /* ── 全螢幕提示 ── */
    #ws-fullscreen-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.88); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99998; color: #fff;
      backdrop-filter: blur(6px);
    }
    #ws-fullscreen-overlay p { font-size: 1.3rem; margin-bottom: 24px; font-family: 'Microsoft JhengHei', sans-serif; text-align: center; line-height: 1.8; }
    #ws-fs-btn { padding: 16px 40px; background: linear-gradient(45deg, #ff6600, #ff9933); color: #fff; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s; font-family: 'Microsoft JhengHei', sans-serif; }
    #ws-fs-btn:hover { transform: scale(1.06); }

    /* ── 違規提示 ── */
    #ws-violation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(6px); }
    #ws-violation .ws-vbox { background: #1e2240; padding: 40px 36px; border-radius: 16px; border: 2px solid #ff6600; max-width: 480px; text-align: center; }
    #ws-violation h2 { color: #ff6600; font-size: 1.8rem; margin-bottom: 16px; }
    #ws-violation p { font-size: 1.1rem; line-height: 1.7; margin-bottom: 28px; font-family: 'Microsoft JhengHei', sans-serif; }
    #ws-violation button { padding: 12px 28px; background: #ff6600; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-family: 'Microsoft JhengHei', sans-serif; }

    /* ── 影片控制 ── */
    #ws-video-controls { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; gap: 10px; }
    #ws-video-controls button { background: rgba(0,0,0,0.55); border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; }

    /* Loading spinner */
    @keyframes ld-spin { to { transform: rotate(360deg); } }
    .ld-spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(74,108,247,0.3);
      border-top-color: #4a6cf7;
      border-radius: 50%;
      animation: ld-spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    .loading-text { font-family: 'Microsoft JhengHei', sans-serif; color: #94a3b8; font-size: 1rem; }

    /* ── 等待畫面 ── */
    #main-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; overflow-y: auto; padding: 10px;
    }
    .container {
      width: 100%; max-width: 500px; background: rgba(255, 255, 255, 0.07);
      border-radius: 20px; padding: clamp(24px, 5vw, 40px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4); text-align: center;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
    }
    .container h1 {
      font-family: 'Pixel', monospace;
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      color: #e2e8f0; margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(74,108,247,0.6); line-height: 1.5;
    }
    .waiting-icon { font-size: 4rem; margin-bottom: 16px; animation: float 3s ease-in-out infinite; display: block; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .waiting-text { font-family: 'Microsoft JhengHei', sans-serif; font-size: 1.1rem; color: #94a3b8; line-height: 1.8; margin-bottom: 8px; }
    .waiting-sub { font-size: 0.85rem; color: #64748b; font-family: 'Microsoft JhengHei', sans-serif; }

    /* ── 遊戲畫面 ── */
    #game-wrapper {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 20; background: var(--bg-color);
      opacity: 0; transform: scale(0.95);
      transition: opacity 0.5s ease-out, transform 0.5s ease-out;
      display: none;
      flex-direction: column; align-items: center; justify-content: flex-start;
      padding: clamp(12px, 3vw, 24px);
      overflow-y: auto; overflow-x: hidden;
    }
    #game-wrapper.visible { display: flex; opacity: 1; transform: scale(1); }

    .game-header { text-align: center; margin-bottom: 16px; width: 100%; }
    .game-header h1 {
      font-family: 'Pixel', monospace;
      font-size: clamp(1rem, 4vw, 1.5rem);
      color: #e2e8f0;
      text-shadow: 0 0 15px rgba(74,108,247,0.5); margin-bottom: 6px;
    }
    .progress-badge {
      display: inline-block; padding: 4px 16px;
      background: rgba(74,108,247,0.2); border: 1px solid var(--primary);
      border-radius: 20px; font-size: 0.9rem; color: #a5b4fc;
      font-family: 'Microsoft JhengHei', sans-serif;
    }

    .dice-area {
      width: 100%; background: rgba(0,0,0,0.25);
      border-radius: 16px; padding: 20px;
      border: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px;
    }
    .dice-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--dice-size));
      gap: 12px; justify-content: center; margin-bottom: 12px;
    }
    .scene { width: var(--dice-size); height: var(--dice-size); perspective: 700px; }
    .dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s ease-in-out; }
    .face { position: absolute; width: 100%; height: 100%; background: linear-gradient(145deg, #f5f5f5, #a3a3a3); border-radius: 15%; border: 1.5px solid #555; box-shadow: inset 2px 2px 8px rgba(255,255,255,0.8), inset -2px -2px 6px rgba(0,0,0,0.4), 2px 2px 5px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; justify-content: center; align-items: center; backface-visibility: hidden; }
    .face1 { background: linear-gradient(145deg, #ffffcc, #e6e600); transform: translateZ(calc(var(--dice-size) / 2)); }
    .face2 { background: linear-gradient(145deg, #d2b48c, #8b4513); transform: rotateY(90deg) translateZ(calc(var(--dice-size) / 2)); }
    .face3 { background: linear-gradient(145deg, #ffcccc, #e60000); transform: rotateY(180deg) translateZ(calc(var(--dice-size) / 2)); }
    .face4 { background: linear-gradient(145deg, #cce5ff, #0047ab); transform: rotateY(-90deg) translateZ(calc(var(--dice-size) / 2)); }
    .face5 { background: linear-gradient(145deg, #ffe6cc, #e67e22); transform: rotateX(90deg) translateZ(calc(var(--dice-size) / 2)); }
    .face6 { background: linear-gradient(145deg, #ccffcc, #006600); transform: rotateX(-90deg) translateZ(calc(var(--dice-size) / 2)); }
    .dot { width: 18%; height: 18%; border-radius: 50%; margin: 5%; background: radial-gradient(circle at 30% 30%, #222, #000); box-shadow: inset 1px 1px 2px rgba(255,255,255,0.2), 1px 1px 1px rgba(0,0,0,0.9); }
    .dice.rolling-0 { animation: spin-0 0.5s infinite linear; }
    .dice.rolling-1 { animation: spin-1 0.6s infinite linear; }
    .dice.rolling-2 { animation: spin-2 0.45s infinite ease-in-out; }
    .dice.rolling-3 { animation: spin-3 0.55s infinite linear; }
    .dice.rolling-4 { animation: spin-4 0.65s infinite ease-out; }
    .dice.rolling-5 { animation: spin-5 0.5s infinite linear; }
    @keyframes spin-0 { 100% { transform: rotateX(360deg) rotateY(720deg); } }
    @keyframes spin-1 { 100% { transform: rotateX(-720deg) rotateY(360deg); } }
    @keyframes spin-2 { 100% { transform: rotateY(360deg) rotateZ(720deg); } }
    @keyframes spin-3 { 100% { transform: rotateX(-360deg) rotateZ(-720deg); } }
    @keyframes spin-4 { 100% { transform: rotateY(-720deg) rotateZ(360deg); } }
    @keyframes spin-5 { 100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); } }

    .combo-text { text-align: center; font-family: 'Microsoft JhengHei', sans-serif; font-weight: bold; font-size: clamp(0.95rem, 3vw, 1.1rem); color: #f59e0b; min-height: 28px; }

    .best-result-bar {
      width: 100%; text-align: center; padding: 10px 16px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      border-radius: 10px; font-family: 'Microsoft JhengHei', sans-serif;
      font-size: 0.95rem; color: #34d399; margin-bottom: 16px;
    }

    .spin-btn {
      display: block; width: 100%; max-width: 320px; margin: 0 auto;
      padding: 16px 24px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 12px; cursor: pointer;
      font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 700;
      font-family: 'Microsoft JhengHei', sans-serif; letter-spacing: 2px;
      transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(74,108,247,0.4);
    }
    .spin-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(74,108,247,0.5); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; box-shadow: none; background: #475569; }

    #results-history {
      width: 100%; max-width: 480px;
      background: rgba(0,0,0,0.2); border-radius: 12px;
      padding: 12px 16px; border: 1px solid rgba(255,255,255,0.08); margin-top: 12px;
    }
    #results-history h4 { font-family: 'Microsoft JhengHei', sans-serif; font-size: 0.85rem; color: #64748b; margin-bottom: 8px; }
    #results-history ol { list-style: decimal; list-style-position: inside; max-height: 120px; overflow-y: auto; font-family: 'Microsoft JhengHei', sans-serif; font-size: 0.85rem; color: #94a3b8; }
    #results-history li { padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }

    /* ── 結果全螢幕 ── */
    #game-result-display {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 50; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background-color: var(--bg-color);
    }
    #game-result-display.show { display: flex; }
    .result-container {
      width: 100%; max-width: 560px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
      border-radius: 20px; text-align: center; margin: 16px;
    }
    .result-container.jackpot { background: linear-gradient(135deg, rgba(255,65,108,0.15), rgba(244,63,94,0.15)); border: 1px solid #ff416c; animation: pulse 1.5s infinite; }
    .result-container.lose { background: rgba(0,0,0,0.3); border: 1px solid #475569; }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
    .result-icon { font-size: 4rem; margin-bottom: 16px; }
    .result-container h2 { font-family: 'Pixel', monospace; font-size: clamp(1.5rem, 6vw, 2.5rem); margin-bottom: 16px; text-shadow: 2px 2px 4px #000; }
    .result-container p { font-family: 'Microsoft JhengHei', sans-serif; font-size: 1.1rem; line-height: 1.7; margin-bottom: 12px; color: #cbd5e1; }
    .prize-highlight { display: inline-block; padding: 14px 28px; margin: 12px 0; background: linear-gradient(45deg, #f59e0b, #ef4444); border-radius: 10px; font-size: 1.8em; font-family: 'Microsoft JhengHei', sans-serif; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); color: #fff; border: 2px solid #fff; }
    .prize-notice { font-size: 0.9rem; color: #facc15; font-weight: bold; line-height: 1.6; padding: 12px 16px; border: 1px dashed #facc15; border-radius: 8px; margin-top: 12px; background: rgba(0,0,0,0.25); font-family: 'Microsoft JhengHei', sans-serif; }
    .logout-btn { margin-top: 20px; padding: 14px 32px; background: #475569; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-family: 'Microsoft JhengHei', sans-serif; font-weight: 600; transition: background 0.2s; }
    .logout-btn:hover { background: #64748b; }

    /* ── 已玩鎖定畫面 ── */
    .lock-container { background: rgba(239,68,68,0.1); border: 1px solid #ef4444; border-radius: 20px; padding: 32px 24px; max-width: 400px; text-align: center; margin: 16px; }
    .lock-container h2 { font-family: 'Microsoft JhengHei', sans-serif; font-size: 1.5rem; margin-bottom: 12px; }
    .lock-container p { font-family: 'Microsoft JhengHei', sans-serif; color: #cbd5e1; margin-bottom: 8px; }
    #daily-countdown { font-size: 2.5rem; font-family: 'Pixel', monospace; color: #f87171; margin: 12px 0; letter-spacing: 4px; }

    #ws-badge { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.55); color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 13px; display: flex; align-items: center; gap: 7px; z-index: 200; opacity: 0.8; }

    /* ── 手機末4碼輸入 ── */
    #phone-input-area { margin-top: 24px; }
    #phone-input-area p { font-family: 'Microsoft JhengHei', sans-serif; font-size: 1rem; color: #94a3b8; margin-bottom: 16px; line-height: 1.8; }
    .phone-digits { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .phone-digit {
      width: 56px; height: 64px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
      border-radius: 12px; color: #fff; font-size: 1.8rem; font-weight: 700;
      text-align: center; outline: none; caret-color: #4a6cf7;
      font-family: 'Pixel', monospace;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .phone-digit:focus { border-color: #4a6cf7; background: rgba(74,108,247,0.15); }
    .phone-digit.filled { border-color: #10b981; }
    #phone-submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(45deg, #4a6cf7, #10b981);
      color: #fff; border: none; border-radius: 12px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      font-family: 'Microsoft JhengHei', sans-serif; letter-spacing: 2px;
      transition: opacity 0.2s;
    }
    #phone-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #phone-error { font-family: 'Microsoft JhengHei', sans-serif; font-size: 0.9rem; color: #f87171; margin-top: 12px; min-height: 20px; }
  </style>
</head>
<body>

<div class="video-background">
  <video id="ws-bg-video" autoplay muted loop playsinline>
    <source src="https://assets.codepen.io/3364143/sample.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
</div>

<div id="ws-fullscreen-overlay">
  <p>🎲 骰子每日挑戰<br><span style="font-size:0.9rem;color:#aaa;">請進入全螢幕以開始遊戲</span></p>
  <button id="ws-fs-btn">📱 進入全螢幕</button>
</div>

<div id="ws-violation">
  <div class="ws-vbox">
    <h2><i class="fas fa-exclamation-circle"></i></h2>
    <p id="ws-violation-msg"></p>
    <button id="ws-violation-ok">確定</button>
  </div>
</div>

<div id="ws-video-controls">
  <button id="ws-mute"><i class="fas fa-volume-mute"></i></button>
  <button id="ws-pause"><i class="fas fa-pause"></i></button>
</div>

<div id="ws-badge"><i class="fas fa-shield-alt"></i></div>

<!-- VIEW 1: 等待/驗證畫面 -->
<div id="main-container">
  <div class="container">
    <h1>骰子每日挑戰</h1>
    <div id="qr-waiting-msg">
      <span class="waiting-icon">🎲</span>
      <p class="waiting-text">請掃描桌上的 <strong style="color:#4a6cf7;">QR Code</strong> 進入遊戲</p>
      <p class="waiting-sub">每人每日限玩一次</p>
    </div>
    <!-- 手機末4碼輸入（有 vid 後顯示） -->
    <div id="phone-input-area" style="display:none;">
      <p>請輸入您的<strong style="color:#fff;">手機號碼末 4 碼</strong><br>作為今日參加憑證</p>
      <div class="phone-digits">
        <input class="phone-digit" id="d0" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="phone-digit" id="d1" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="phone-digit" id="d2" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="phone-digit" id="d3" type="tel" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <button id="phone-submit-btn" disabled>確認進場 🎲</button>
      <div id="phone-error"></div>
    </div>
  </div>
</div>

<!-- VIEW 2: 遊戲畫面（Solo Only） -->
<div id="game-wrapper">
  <div class="game-header">
    <h1>🎲 骰子挑戰</h1>
    <div class="progress-badge">第 <span id="current-spin">1</span> / 8 次機會</div>
  </div>

  <div class="best-result-bar" id="best-result-bar">目前最佳成績：無</div>

  <div class="dice-area">
    <div id="dice-grid" class="dice-grid"></div>
    <div id="combo-text" class="combo-text"></div>
  </div>

  <button id="spin-btn" class="spin-btn">🎲 擲骰子</button>

  <div id="results-history" style="display:none;">
    <h4>紀錄</h4>
    <ol id="results-list"></ol>
  </div>
</div>

<!-- VIEW 3: 結果全螢幕 -->
<div id="game-result-display"></div>

<audio id="sound-roll"    src="https://assets.mixkit.co/sfx/preview/mixkit-game-dice-roll-2021.mp3" preload="auto"></audio>
<audio id="sound-win"     src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3" preload="auto"></audio>
<audio id="sound-lose"    src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.mp3" preload="auto"></audio>
<audio id="sound-jackpot" src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-win-2016.mp3" preload="auto"></audio>
<audio id="music-main"    src="https://assets.mixkit.co/music/preview/mixkit-game-show-suspense-waiting-667.mp3" loop preload="auto"></audio>

<script>
// ══════════════════════════════════════════════════════
//  設定區
// ══════════════════════════════════════════════════════
// v2.0 GAS（含 PlayerSlots 七次輪轉）
const CHECKIN_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwvvAIsGeHwQ5eyezbaUaY2KqYhMEo2cB_loCPrVSQ_Eme_wbkpNy7w9mID_iby7iyjrQ/exec';

// ══════════════════════════════════════════════════════
//  遊戲狀態
// ══════════════════════════════════════════════════════
const gameState = {
  isGameActive: false, isSpinning: false, isEnding: false,
  vid: null, playerInfo: {}, ipAddress: '載入中...',
  soloSpins: 0,
  soloBestResult: { prize: null, score: 0 },
  mustWin: false,   // ★ 由 GAS phone_player_slot 決定（七次輪轉）
  currentMusic: null,
};

const faceAngles = { 1:{x:0,y:0}, 2:{x:0,y:-90}, 3:{x:0,y:180}, 4:{x:0,y:90}, 5:{x:-90,y:0}, 6:{x:90,y:0} };

// DOM
const mainContainer  = document.getElementById('main-container');
const gameWrapper    = document.getElementById('game-wrapper');
const gameResultDiv  = document.getElementById('game-result-display');
const qrWaitingMsg   = document.getElementById('qr-waiting-msg');
const currentSpinEl  = document.getElementById('current-spin');
const bestResultBar  = document.getElementById('best-result-bar');
const diceGrid       = document.getElementById('dice-grid');
const comboTextEl    = document.getElementById('combo-text');
const spinBtn        = document.getElementById('spin-btn');
const resultsHistory = document.getElementById('results-history');
const resultsList    = document.getElementById('results-list');

let diceElements = [];
let dailyCountdownTimerId;

// ══════════════════════════════════════════════════════
//  本機每日快取（第一道防線，最快）
// ══════════════════════════════════════════════════════
function getTodayKey() {
  const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
  return `dice_played_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function hasPlayedTodayLocal() {
  try { return localStorage.getItem(getTodayKey()) === '1'; } catch(e) { return false; }
}
function markPlayedTodayLocal() {
  try {
    const key = getTodayKey();
    localStorage.setItem(key, '1');
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith('dice_played_') && k !== key) localStorage.removeItem(k);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════════════
//  主入口：QR Code 驗證 → 顯示手機末4碼輸入框
// ══════════════════════════════════════════════════════
async function checkQRAndEnter() {
  const urlParams = new URLSearchParams(window.location.search);
  const type = urlParams.get('type');
  const vid  = urlParams.get('vid');

  if (!vid || type !== 'dice') return; // 無參數：保持等待畫面

  gameState.vid = vid;

  // ── Layer 1：本機快取（立即擋） ──
  if (hasPlayedTodayLocal()) {
    showDailyLockScreen();
    return;
  }

  // ── 顯示手機末4碼輸入框 ──
  document.getElementById('qr-waiting-msg').style.display = 'none';
  document.getElementById('phone-input-area').style.display = 'block';
  setupPhoneInput();
}

// ══════════════════════════════════════════════════════
//  手機末4碼輸入框行為
// ══════════════════════════════════════════════════════
function setupPhoneInput() {
  const digits  = [0,1,2,3].map(i => document.getElementById('d' + i));
  const btn     = document.getElementById('phone-submit-btn');
  const errEl   = document.getElementById('phone-error');

  // 自動跳格 + 啟用按鈕
  digits.forEach((el, i) => {
    el.addEventListener('input', () => {
      // 只保留數字
      el.value = el.value.replace(/\D/g, '').slice(-1);
      if (el.value && i < 3) digits[i + 1].focus();
      // 四格全填才啟用按鈕
      btn.disabled = !digits.every(d => d.value.length === 1);
      if (el.value) el.classList.add('filled');
      else el.classList.remove('filled');
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !el.value && i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = '';
        digits[i - 1].classList.remove('filled');
        btn.disabled = true;
      }
    });
  });

  // 自動 focus 第一格
  setTimeout(() => digits[0].focus(), 100);

  btn.addEventListener('click', async () => {
    const phone4 = digits.map(d => d.value).join('');
    if (phone4.length !== 4) return;

    btn.disabled = true;
    errEl.textContent = '';
    document.getElementById('qr-waiting-msg').innerHTML =
      `<div class="ld-spinner"></div><p class="loading-text">驗證中，請稍候…</p>`;
    document.getElementById('qr-waiting-msg').style.display = 'block';
    document.getElementById('phone-input-area').style.display = 'none';

    await proceedWithPhone(phone4);
  });
}

// ══════════════════════════════════════════════════════
//  輸入完成後送 GAS 驗證
//  識別鍵 = phone4（後端加上今天日期，不存明碼）
// ══════════════════════════════════════════════════════
async function proceedWithPhone(phone4) {
  const vid = gameState.vid;

  try {
    const res  = await fetch(
      `${CHECKIN_SCRIPT_URL}?action=phone_player_slot` +
      `&phone4=${encodeURIComponent(phone4)}` +
      `&vid=${encodeURIComponent(vid)}` +
      `&t=${Date.now()}`
    );
    const data = await res.json();

    if (data && data.status === 'DENY') {
      markPlayedTodayLocal();
      showDailyLockScreen();
      return;
    }

    if (data && data.status === 'OK') {
      gameState.mustWin = !!(data.isWin);
    }
  } catch(e) {
    console.warn('phone_player_slot 查詢失敗，繼續進場 mustWin=false:', e);
  }

  markPlayedTodayLocal();
  setTimeout(() => enterGame(), 300);
}

// ══════════════════════════════════════════════════════
//  鎖定畫面（今日已玩）
// ══════════════════════════════════════════════════════
function showDailyLockScreen() {
  mainContainer.style.display = 'none';
  gameWrapper.classList.remove('visible');
  gameResultDiv.innerHTML = `
    <div class="lock-container">
      <div style="font-size:3rem;margin-bottom:12px;">⏳</div>
      <h2>今日已挑戰過！</h2>
      <p>每人每日限玩一次</p>
      <p style="margin-top:8px;">下次開放倒數：</p>
      <div id="daily-countdown">--:--:--</div>
      <button onclick="logout()" class="logout-btn">確認</button>
    </div>`;
  gameResultDiv.className = 'show';
  gameResultDiv.style.display = 'flex';
  stopMusic();
  if (dailyCountdownTimerId) clearInterval(dailyCountdownTimerId);
  dailyCountdownTimerId = setInterval(() => {
    const taipei   = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const tomorrow = new Date(taipei.getFullYear(), taipei.getMonth(), taipei.getDate() + 1);
    const diff     = tomorrow - taipei;
    if (diff < 0) { logout(); return; }
    const el = document.getElementById('daily-countdown');
    if (!el) return;
    el.textContent = [
      String(Math.floor(diff / 36e5)).padStart(2, '0'),
      String(Math.floor((diff % 36e5) / 6e4)).padStart(2, '0'),
      String(Math.floor((diff % 6e4) / 1e3)).padStart(2, '0')
    ].join(':');
  }, 1000);
}

// ══════════════════════════════════════════════════════
//  進入遊戲
// ══════════════════════════════════════════════════════
function enterGame() {
  mainContainer.style.display = 'none';
  gameWrapper.classList.add('visible');
  resultsHistory.style.display = 'block';
  diceElements = generateDice(diceGrid, 6);
  spinBtn.addEventListener('click', runSpin);
  playMusic('music-main');
  gameState.isGameActive = true;
}

// ══════════════════════════════════════════════════════
//  骰子 HTML 生成
// ══════════════════════════════════════════════════════
function generateDice(gridEl, count) {
  gridEl.innerHTML = '';
  const elements = [];
  for (let i = 0; i < count; i++) {
    const scene = document.createElement('div'); scene.className = 'scene';
    const dice  = document.createElement('div'); dice.className = 'dice';
    for (let f = 1; f <= 6; f++) {
      const face = document.createElement('div'); face.className = `face face${f}`;
      for (let d = 0; d < f; d++) {
        const dot = document.createElement('div'); dot.className = 'dot'; face.appendChild(dot);
      }
      dice.appendChild(face);
    }
    scene.appendChild(dice); gridEl.appendChild(scene); elements.push(dice);
  }
  return elements;
}

// ══════════════════════════════════════════════════════
//  Solo 遊戲邏輯（8次擲骰，保留最佳牌型）
// ══════════════════════════════════════════════════════
async function runSpin() {
  if (!gameState.isGameActive || gameState.isSpinning) return;
  gameState.isSpinning = true;
  spinBtn.disabled = true;
  gameState.soloSpins++;
  currentSpinEl.textContent = gameState.soloSpins;

  const values = rollDice(6);
  await animateDice(diceElements, values);
  const result = getDiceCombination(values);
  comboTextEl.textContent = result.bestComboText;

  const isNewBest = result.score > gameState.soloBestResult.score;
  if (isNewBest) {
    gameState.soloBestResult = { prize: getPrize(result.score), score: result.score };
    bestResultBar.textContent = `目前最佳成績：${gameState.soloBestResult.prize || '無'}（${result.bestComboText}）`;
    if (result.score >= 3000) playSound('sound-win');
  }

  addHistory(`第 ${gameState.soloSpins} 次：${result.bestComboText}${isNewBest && result.score >= 3000 ? ' ✨新紀錄' : ''}`);

  if (gameState.soloSpins >= 8) {
    endGame();
  } else {
    gameState.isSpinning = false;
    spinBtn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════
//  rollDice：mustWin 完全控制結果
//  mustWin=true  → 全部出6（六條），無論如何都中獎
//  mustWin=false → 隨機但確保不出現六條（不中獎）
// ══════════════════════════════════════════════════════
function rollDice(count) {
  if (gameState.mustWin) {
    return Array.from({ length: count }, () => 6);
  } else {
    let result, attempts = 0;
    do {
      result = Array.from({ length: count }, () => Math.floor(Math.random() * 6) + 1);
      const counts = {};
      result.forEach(n => counts[n] = (counts[n]||0)+1);
      const max = Math.max(...Object.values(counts));
      if (max < count) break;
      attempts++;
    } while (attempts < 20);
    return result;
  }
}

// ══════════════════════════════════════════════════════
//  骰子動畫
// ══════════════════════════════════════════════════════
async function animateDice(elements, values) {
  playSound('sound-roll');
  comboTextEl.textContent = '…';
  elements.forEach((d, i) => { d.className = `dice rolling-${i % 6}`; });
  await new Promise(r => setTimeout(r, 1500));
  elements.forEach((d, i) => {
    d.className = 'dice';
    const v  = values[i];
    const ex = 360 * (Math.floor(Math.random() * 2) + 2);
    const ey = 360 * (Math.floor(Math.random() * 2) + 2);
    d.style.transform = `rotateX(${faceAngles[v].x + ex}deg) rotateY(${faceAngles[v].y + ey}deg)`;
  });
}

// ══════════════════════════════════════════════════════
//  牌型計算
// ══════════════════════════════════════════════════════
function getDiceCombination(dice) {
  const counts = {};
  dice.forEach(n => counts[n] = (counts[n]||0)+1);
  const combos = Object.entries(counts)
    .map(([num, count]) => ({ num: parseInt(num), count }))
    .filter(c => c.count >= 2)
    .sort((a, b) => b.count - a.count || b.num - a.num);
  const sum = dice.reduce((a, b) => a + b, 0);
  let score = sum, bestComboText = '散牌';
  if (combos.length > 0) {
    const best = combos[0];
    if      (best.count === 6) { bestComboText = `六條(${best.num})`; score = 6000 + best.num; }
    else if (best.count === 5) { bestComboText = `五條(${best.num})`; score = 5000 + best.num; }
    else if (best.count === 4) { bestComboText = `四條(${best.num})`; score = 4000 + best.num; }
    else if (best.count === 3) { bestComboText = `三條(${best.num})`; score = 3000 + best.num; }
    else                        { bestComboText = `對子(${best.num})`; score = 2000 + best.num + sum; }
  }
  return { score, bestComboText };
}
function getPrize(score) {
  if (score >= 3000) return '免費吃到飽';
  return null;
}

// ══════════════════════════════════════════════════════
//  遊戲結束
// ══════════════════════════════════════════════════════
function endGame() {
  if (gameState.isEnding) return;
  gameState.isEnding = true;
  gameState.isGameActive = false;
  stopMusic();

  // ★ mustWin 最終安全防線：結果完全由後端決定
  let prize, remark;
  if (gameState.mustWin) {
    prize  = '免費吃到飽';
    remark = '🎊 恭喜！您在本次挑戰中獲得獎勵！';
  } else {
    prize  = null;
    remark = '本次挑戰結束，再接再厲！下次好運！';
  }

  const isWin = !!prize;
  const icon  = isWin ? '🎉' : '😥';
  const title = isWin ? '恭喜！' : '挑戰結束！';
  const cls   = isWin ? 'jackpot' : 'lose';

  const prizeHTML = isWin ? `
    <p>您贏得了</p>
    <div class="prize-highlight">${prize}</div>
    <p class="prize-notice">
      若您已得獎請暫時不要登出，<br>
      請通知服務員確認。<br>
      所有操作需由當事人親在現場完成始算生效<br>
      （畫面登出就算此次挑戰失敗）
    </p>` : '';

  gameResultDiv.innerHTML = `
    <div class="result-container ${cls}">
      <div class="result-icon">${icon}</div>
      <h2>${title}</h2>
      <p>${remark}</p>
      ${prizeHTML}
      <button onclick="logout()" class="logout-btn">確認並登出</button>
    </div>`;
  gameResultDiv.className = 'show';
  gameResultDiv.style.display = 'flex';
  gameWrapper.classList.remove('visible');

  if (isWin) {
    playSound('sound-jackpot');
    if (typeof confetti === 'function') confetti({ particleCount: 200, spread: 120, origin: { x: 0.5, y: 0 }, angle: 90, startVelocity: 30 });
  } else {
    playSound('sound-lose');
  }

  syncResult(isWin, prize || '無', remark);
}

// ══════════════════════════════════════════════════════
//  回傳結果給後端
// ══════════════════════════════════════════════════════
async function syncResult(isWin, prize, remark) {
  const fp = gameState.deviceFingerprint || await getDeviceFingerprint();
  try {
    await fetch(CHECKIN_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:      'updateStats',
        type:        'dice',
        vid:         gameState.vid,
        mode:        'solo',
        isWin,
        prize,
        remark,
        ip:          gameState.ipAddress,
        fingerprint: fp,
        timestamp:   new Date().toISOString()
      }),
      mode: 'no-cors'
    });
  } catch(e) { console.warn('syncResult error:', e); }
}

// ══════════════════════════════════════════════════════
//  工具函式
// ══════════════════════════════════════════════════════
function addHistory(msg) {
  const li = document.createElement('li');
  li.innerHTML = msg;
  resultsList.appendChild(li);
  resultsList.scrollTop = resultsList.scrollHeight;
}
function playSound(id) {
  const s = document.getElementById(id);
  if (s) { s.currentTime = 0; s.play().catch(() => {}); }
}
function playMusic(id) {
  stopMusic();
  const m = document.getElementById(id);
  if (m) { m.currentTime = 0; m.play().catch(() => {}); gameState.currentMusic = m; }
}
function stopMusic() {
  if (gameState.currentMusic) { gameState.currentMusic.pause(); gameState.currentMusic.currentTime = 0; gameState.currentMusic = null; }
}
async function getIPAddress() {
  try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); gameState.ipAddress = d.ip; }
  catch(e) { gameState.ipAddress = '無法取得'; }
}
function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
async function logout() {
  if (isFullscreen()) { try { await document.exitFullscreen(); } catch(e) {} }
  window.location.href = 'index.html';
}

// ══════════════════════════════════════════════════════
//  whole_screen：全螢幕 + 內容保護
// ══════════════════════════════════════════════════════
(function() {
  const overlay   = document.getElementById('ws-fullscreen-overlay');
  const fsBtn     = document.getElementById('ws-fs-btn');
  const violation = document.getElementById('ws-violation');
  const violMsg   = document.getElementById('ws-violation-msg');
  const violOk    = document.getElementById('ws-violation-ok');
  const bgVideo   = document.getElementById('ws-bg-video');
  const muteBtn   = document.getElementById('ws-mute');
  const pauseBtn  = document.getElementById('ws-pause');

  function showViolation(msg) { violMsg.textContent = msg; violation.style.display = 'flex'; }
  function hideViolation()    { violation.style.display = 'none'; }

  fsBtn && fsBtn.addEventListener('click', () => {
    document.documentElement.requestFullscreen().then(() => {
      overlay.style.display = 'none';
      document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) showViolation('此網頁必須在全螢幕模式下瀏覽，請點擊確定以恢復。');
      });
      getIPAddress();
      checkQRAndEnter(); // 進入全螢幕後才開始驗證
    }).catch(() => {
      overlay.style.display = 'none';
      getIPAddress();
      checkQRAndEnter();
    });
  });

  violOk && violOk.addEventListener('click', () => {
    document.documentElement.requestFullscreen().then(() => hideViolation()).catch(() => hideViolation());
  });

  muteBtn && muteBtn.addEventListener('click', () => {
    if (bgVideo) { bgVideo.muted = !bgVideo.muted; muteBtn.innerHTML = bgVideo.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; }
  });
  pauseBtn && pauseBtn.addEventListener('click', () => {
    if (bgVideo) { bgVideo.paused ? bgVideo.play() : bgVideo.pause(); pauseBtn.innerHTML = bgVideo.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>'; }
  });

  document.addEventListener('contextmenu', e => { e.preventDefault(); showViolation('此操作已被禁止：內容受版權保護。'); });
  document.addEventListener('keydown', e => {
    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
      e.preventDefault(); showViolation('此網頁內容受保護，無法使用開發者工具。');
    }
  });
  document.body.onselectstart = () => false;
  document.body.oncopy = () => false;
  document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') { e.preventDefault(); showViolation('圖像拖拽保存已被禁止。'); } });
})();
</script>
