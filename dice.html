<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>骰子每日挑戰</title>

<!-- ===== PWA 全螢幕設定 ===== -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="骰子挑戰">
<meta name="theme-color" content="#060a08">
<link rel="manifest" href="manifest.json">
<!-- iOS 主畫面圖示 (可換成自己的圖) -->
<link rel="apple-touch-icon" href="icon.png">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: #060a08;
  color: #f0ead8;
  touch-action: manipulation;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ===== CSS VARIABLES ===== */
:root {
  --gold: #c9a227;
  --gold2: #f0c84a;
  --gold-dim: #8b6914;
  --red: #c0392b;
  --red-glow: #e74c3c;
  --blue-die: #2e6da4;
  --green: #1e8449;
  --bg-dark: #060a08;
  --bg-felt: #0c1a0e;
  --bg-player: rgba(30,20,0,0.75);
  --bg-store: rgba(0,14,28,0.75);
  --border-gold: rgba(201,162,39,0.3);
  --border-blue: rgba(46,109,164,0.4);
  --text-muted: #7a7060;
  --text-dim: #4a4538;
  --radius: 12px;
  --radius-sm: 8px;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ===== FELT BACKGROUND ===== */
.felt-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, #122015 0%, #080f09 50%, #030604 100%);
}
.felt-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.005) 3px, rgba(255,255,255,0.005) 4px);
}

/* ===== LOGIN SCREEN ===== */
#loginScreen {
  z-index: 10;
  flex-direction: column;
  gap: 0;
}
.login-box {
  position: relative; z-index: 2;
  width: min(400px, 92vw);
  background: rgba(10,15,10,0.92);
  border: 1px solid var(--border-gold);
  border-radius: 16px;
  padding: 36px 32px 32px;
  box-shadow: 0 0 60px rgba(201,162,39,0.12), 0 20px 40px rgba(0,0,0,0.6);
}
.login-logo {
  text-align: center; margin-bottom: 28px;
}
.login-logo .logo-icon {
  font-size: 52px; line-height: 1;
  filter: drop-shadow(0 0 12px rgba(201,162,39,0.5));
}
.login-logo h1 {
  font-size: 20px; letter-spacing: 4px; color: var(--gold2);
  text-shadow: 0 0 20px rgba(201,162,39,0.4);
  margin-top: 8px;
}
.login-logo p {
  font-size: 12px; color: var(--text-muted); letter-spacing: 2px; margin-top: 4px;
}
.login-field { margin-bottom: 16px; }
.login-field label {
  display: block; font-size: 11px; letter-spacing: 2px;
  color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase;
}
.login-field input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,162,39,0.2);
  border-radius: var(--radius-sm);
  color: var(--gold2); font-size: 18px; letter-spacing: 4px;
  font-family: 'Courier New', monospace;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  text-align: center;
}
.login-field input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,162,39,0.12);
}
.login-field input::placeholder { color: var(--text-dim); letter-spacing: 1px; font-size: 14px; }
.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #c9a227, #8b6914);
  border: none; border-radius: 50px;
  color: #1a0a00; font-size: 16px; font-weight: bold;
  letter-spacing: 4px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(201,162,39,0.35), 0 2px 0 #4a3000;
  transition: all 0.15s; margin-top: 8px;
  font-family: inherit;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(201,162,39,0.5); }
.login-btn:active { transform: translateY(1px); }
.login-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.login-error {
  margin-top: 14px; padding: 10px 14px;
  background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3);
  border-radius: var(--radius-sm); font-size: 13px; color: #e88;
  text-align: center; display: none;
}
.login-note {
  font-size: 11px; color: var(--text-dim); text-align: center;
  margin-top: 16px; line-height: 1.6;
}

/* ===== GAME SCREEN ===== */
#gameScreen {
  z-index: 5;
  flex-direction: column;
  padding: 0;
  align-items: stretch;
  justify-content: flex-start;
}

/* ===== HEADER BAR ===== */
.header-bar {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  background: rgba(0,0,0,0.7);
  border-bottom: 1px solid rgba(201,162,39,0.2);
  flex-shrink: 0;
  min-height: 52px;
}
.mode-badge {
  display: flex; align-items: center; gap: 8px;
}
.mode-icon { font-size: 16px; }
.mode-name {
  font-size: 15px; font-weight: bold;
  color: var(--gold2); letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(201,162,39,0.5);
}
.round-badge {
  font-size: 13px; color: var(--text-muted); letter-spacing: 1px;
}
.quit-btn {
  padding: 5px 14px;
  background: rgba(180,30,30,0.2); color: #e88;
  border: 1px solid rgba(192,57,43,0.4);
  border-radius: 20px; font-size: 12px; cursor: pointer;
  transition: background 0.2s; letter-spacing: 1px;
}
.quit-btn:hover { background: rgba(180,30,30,0.5); }

/* ===== SCORE ROW ===== */
.score-row {
  position: relative; z-index: 2;
  display: flex; align-items: center;
  padding: 6px 16px; gap: 0;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  flex-shrink: 0;
}
.score-block {
  flex: 1; text-align: center;
}
.score-label { font-size: 10px; letter-spacing: 2px; color: var(--text-muted); }
.score-num {
  font-size: 32px; font-weight: bold; line-height: 1.1;
  font-family: 'Courier New', monospace;
}
.score-num.player { color: var(--gold2); text-shadow: 0 0 16px rgba(201,162,39,0.6); }
.score-num.store { color: var(--red-glow); text-shadow: 0 0 16px rgba(231,76,60,0.6); }
.score-vs {
  width: 40px; text-align: center;
  font-size: 13px; color: var(--text-dim); letter-spacing: 1px;
}

/* ===== ARENA (MAIN BATTLE AREA) ===== */
.arena {
  position: relative; z-index: 2;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 36px 1fr;
  padding: 10px 10px 6px;
  gap: 6px;
  min-height: 0;
}
.side {
  display: flex; flex-direction: column;
  border-radius: 10px;
  padding: 10px 10px 8px;
  gap: 8px;
  min-height: 0;
}
.side-player { background: var(--bg-player); border: 1px solid var(--border-gold); }
.side-store  { background: var(--bg-store);  border: 1px solid var(--border-blue); }

.side-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.side-label {
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted);
}

/* ===== DICE GRID ===== */
.dice-grid {
  flex: 1;
  display: grid;
  gap: 6px;
  align-items: center;
  justify-items: center;
  min-height: 0;
}
/* default 6 dice = 3x2 */
.dice-grid.dice-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
.dice-grid.dice-4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
.dice-grid.dice-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
.dice-grid.dice-8 { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }

.die {
  width: 100%; aspect-ratio: 1;
  max-width: 90px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  transition: transform 0.15s, box-shadow 0.3s;
  flex-shrink: 0;
}
.die.rolling { animation: dieRoll 0.55s cubic-bezier(.36,.07,.19,.97); }
@keyframes dieRoll {
  0%   { transform: rotate(0deg) scale(1); }
  20%  { transform: rotate(-18deg) scale(0.9); }
  45%  { transform: rotate(22deg) scale(1.08); }
  70%  { transform: rotate(-10deg) scale(0.96); }
  85%  { transform: rotate(5deg) scale(1.02); }
  100% { transform: rotate(0deg) scale(1); }
}
/* Player dice — warm wood/ivory */
.die-p {
  background: linear-gradient(145deg, #d4aa50 0%, #a07820 40%, #7a5810 100%);
  border: 2px solid rgba(201,162,39,0.6);
  box-shadow: 0 3px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.die-p .dot { background: #1a0800; box-shadow: inset 0 1px 2px rgba(0,0,0,0.6); }

/* Store dice — cool slate/blue */
.die-s {
  background: linear-gradient(145deg, #4a8fbf 0%, #235f8a 40%, #0f3a5e 100%);
  border: 2px solid rgba(46,109,164,0.6);
  box-shadow: 0 3px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
}
.die-s .dot { background: #001020; box-shadow: inset 0 1px 2px rgba(0,0,0,0.5); }

/* Win states */
.die-p.win {
  background: linear-gradient(145deg, #f5d565 0%, #c9a227 40%, #9a7510 100%);
  border-color: var(--gold2);
  box-shadow: 0 0 22px rgba(201,162,39,0.7), 0 3px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  animation: winPulse 0.8s ease-out;
}
.die-s.win {
  background: linear-gradient(145deg, #e87070 0%, #c03030 40%, #7a1010 100%);
  border-color: var(--red-glow);
  box-shadow: 0 0 22px rgba(231,76,60,0.7), 0 3px 12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  animation: winPulse 0.8s ease-out;
}
@keyframes winPulse {
  0% { transform: scale(1); }
  40% { transform: scale(1.1); }
  70% { transform: scale(0.97); }
  100% { transform: scale(1); }
}

/* ===== DOT LAYOUTS ===== */
.dots {
  position: absolute;
  width: 72%; height: 72%;
  display: grid;
}
.dots-1 { grid-template: ". . ." ". c ." ". . ." / 1fr 1fr 1fr; }
.dots-2 { grid-template: "a . ." ". . ." ". . b" / 1fr 1fr 1fr; }
.dots-3 { grid-template: "a . ." ". c ." ". . b" / 1fr 1fr 1fr; }
.dots-4 { grid-template: "a . b" ". . ." "c . d" / 1fr 1fr 1fr; }
.dots-5 { grid-template: "a . b" ". c ." "d . e" / 1fr 1fr 1fr; }
.dots-6 { grid-template: "a . b" "c . d" "e . f" / 1fr 1fr 1fr; }
.dot {
  width: 30%; height: 30%;
  border-radius: 50%;
  align-self: center; justify-self: center;
}

/* ===== HAND LABEL ===== */
.hand-label {
  font-size: 12px; text-align: center;
  color: var(--gold);
  padding: 4px 8px;
  background: rgba(201,162,39,0.08);
  border-radius: 20px;
  border: 1px solid rgba(201,162,39,0.15);
  letter-spacing: 1px;
  flex-shrink: 0;
  min-height: 26px; display: flex; align-items: center; justify-content: center;
}

/* ===== VS COLUMN ===== */
.vs-col {
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text-dim); letter-spacing: 1px;
}

/* ===== LOG AREA ===== */
.log-area {
  position: relative; z-index: 2;
  margin: 0 10px 4px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  height: 68px; overflow-y: auto;
  font-size: 12px; color: var(--text-muted);
  font-family: 'Courier New', monospace;
  flex-shrink: 0;
  scroll-behavior: smooth;
}
.log-entry { padding: 1px 0; line-height: 1.5; }
.log-win  { color: var(--gold2); }
.log-lose { color: #e87070; }
.log-info { color: #5ab4e0; }
.log-final { color: #7be870; font-weight: bold; font-size: 13px; }

/* ===== ACTION BAR ===== */
.action-bar {
  position: relative; z-index: 2;
  display: flex; align-items: center; justify-content: center;
  padding: 8px 16px 12px;
  flex-shrink: 0;
}
.roll-btn {
  padding: 13px 0; width: min(320px, 80vw);
  background: linear-gradient(135deg, #c9a227, #8b6914);
  border: none; border-radius: 50px;
  color: #1a0800; font-size: 17px; font-weight: bold;
  letter-spacing: 5px; cursor: pointer;
  box-shadow: 0 4px 24px rgba(201,162,39,0.4), 0 2px 0 #3a2000;
  transition: all 0.15s; font-family: inherit;
}
.roll-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(201,162,39,0.6); }
.roll-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: 0 2px 10px rgba(201,162,39,0.3); }
.roll-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ===== RESULT OVERLAY ===== */
#resultScreen {
  z-index: 20;
  flex-direction: column; gap: 20px;
}
.result-box {
  position: relative; z-index: 2;
  text-align: center;
  width: min(360px, 88vw);
  background: rgba(8,12,8,0.95);
  border-radius: 16px;
  padding: 40px 32px 32px;
  box-shadow: 0 0 60px rgba(201,162,39,0.2);
}
.result-crown { font-size: 60px; line-height: 1; margin-bottom: 12px; }
.result-title {
  font-size: 24px; font-weight: bold; letter-spacing: 4px;
  color: var(--gold2);
  text-shadow: 0 0 20px rgba(201,162,39,0.5);
  margin-bottom: 8px;
}
.result-subtitle { font-size: 14px; color: var(--text-muted); letter-spacing: 2px; }
.result-score {
  margin: 20px 0;
  display: flex; align-items: center; justify-content: center; gap: 20px;
}
.rs-block { text-align: center; }
.rs-label { font-size: 11px; letter-spacing: 2px; color: var(--text-muted); }
.rs-num {
  font-size: 40px; font-weight: bold; font-family: 'Courier New', monospace;
}
.rs-num.p { color: var(--gold2); }
.rs-num.s { color: var(--red-glow); }
.rs-vs { font-size: 18px; color: var(--text-dim); }
.result-win-badge {
  display: inline-block; padding: 8px 24px; border-radius: 20px;
  font-size: 13px; letter-spacing: 3px; margin-bottom: 16px;
}
.badge-win  { background: rgba(201,162,39,0.15); border: 1px solid rgba(201,162,39,0.4); color: var(--gold2); }
.badge-lose { background: rgba(192,57,43,0.12); border: 1px solid rgba(192,57,43,0.3); color: #e88; }
.badge-draw { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #aaa; }
.result-again-btn {
  width: 100%; padding: 13px;
  background: rgba(201,162,39,0.12); border: 1px solid rgba(201,162,39,0.3);
  border-radius: 50px; color: var(--gold); font-size: 14px; letter-spacing: 3px;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.result-again-btn:hover { background: rgba(201,162,39,0.25); }

/* ===== LOADING ===== */
.spinner {
  width: 36px; height: 36px; margin: 0 auto 12px;
  border: 3px solid rgba(201,162,39,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== SPECIAL MODES ===== */
/* Mode 4 — Timer */
.timer-display {
  text-align: center; font-size: 36px; font-family: 'Courier New', monospace;
  color: var(--gold2); text-shadow: 0 0 12px rgba(201,162,39,0.5);
  font-weight: bold; letter-spacing: 3px;
  flex-shrink: 0;
}
.timer-display.urgent { color: #e87070; text-shadow: 0 0 12px rgba(231,76,60,0.5); animation: urgentBlink 0.5s step-end infinite; }
@keyframes urgentBlink { 50% { opacity: 0.5; } }

/* Mode 6 — Life */
.life-display {
  display: flex; gap: 10px; justify-content: center; align-items: center;
  flex-shrink: 0;
}
.life-block { text-align: center; }
.life-num {
  font-size: 28px; font-weight: bold; font-family: 'Courier New', monospace;
}
.life-num.p { color: var(--gold2); }
.life-num.s { color: #e87070; }
.life-bar {
  height: 6px; border-radius: 3px; background: rgba(255,255,255,0.1); width: 80px;
  overflow: hidden; margin-top: 4px;
}
.life-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.life-fill.p { background: linear-gradient(90deg, #c9a227, #f0c84a); }
.life-fill.s { background: linear-gradient(90deg, #c03030, #e87070); }
.life-vs { font-size: 14px; color: var(--text-dim); }

/* Mode 7 — Chain sequence */
.chain-target {
  text-align: center; font-size: 13px; color: var(--text-muted); flex-shrink: 0;
  letter-spacing: 1px; padding: 4px 0;
}
.chain-target span { color: var(--gold); font-weight: bold; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.3); border-radius: 2px; }

/* ===== PARTICLES ===== */
.particle {
  position: fixed; pointer-events: none; z-index: 30;
  border-radius: 50%;
  animation: particleFly 1.2s ease-out forwards;
}
@keyframes particleFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3); }
}
</style>
</head>
<body>

<!-- FELT BACKGROUND (shared) -->
<div class="felt-bg"></div>

<!-- =================== LOGIN SCREEN =================== -->
<div class="screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">🎲</div>
      <h1>骰子每日挑戰</h1>
      <p>DICE DAILY CHALLENGE</p>
    </div>
    <div class="login-field">
      <label>活動帳號</label>
      <input type="text" id="inputAccount" placeholder="A001" maxlength="10"
        oninput="this.value=this.value.toUpperCase()" autocomplete="off" autocorrect="off">
    </div>
    <div class="login-field">
      <label>手機末 4 碼</label>
      <input type="tel" id="inputPhone" placeholder="0000" maxlength="4"
        oninput="this.value=this.value.replace(/\D/g,'')" autocomplete="off">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">開始挑戰</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note">每人每天只能挑戰一次<br>每 7 次到訪隨機產生一次獎勵</div>
  </div>
</div>

<!-- =================== GAME SCREEN =================== -->
<div class="screen hidden" id="gameScreen">
  <!-- Header -->
  <div class="header-bar">
    <div class="mode-badge">
      <span class="mode-icon" id="modeIcon">♠</span>
      <span class="mode-name" id="modeName">王牌對決</span>
    </div>
    <span class="round-badge" id="roundBadge">第 1 / 8 回合</span>
    <button class="quit-btn" onclick="doQuit()">放棄</button>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="score-block">
      <div class="score-label">玩家勝場</div>
      <div class="score-num player" id="playerWins">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-block">
      <div class="score-label">店家勝場</div>
      <div class="score-num store" id="storeWins">0</div>
    </div>
  </div>

  <!-- Special mode info (timer / life / chain) -->
  <div id="specialInfo" style="position:relative;z-index:2;padding:4px 10px 0;display:none;"></div>

  <!-- Arena -->
  <div class="arena" id="arena">
    <div class="side side-player" id="sidePlayer">
      <div class="side-header">
        <span class="side-label">玩家</span>
      </div>
      <div class="dice-grid dice-6" id="playerDice"></div>
      <div class="hand-label" id="playerHand">—</div>
    </div>
    <div class="vs-col">VS</div>
    <div class="side side-store" id="sideStore">
      <div class="side-header">
        <span class="side-label">店家</span>
      </div>
      <div class="dice-grid dice-6" id="storeDice"></div>
      <div class="hand-label" id="storeHand">—</div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-area" id="logArea">
    <div class="log-entry log-info">— 按下擲骰子開始 —</div>
  </div>

  <!-- Action -->
  <div class="action-bar">
    <button class="roll-btn" id="rollBtn" onclick="doRoll()">擲 骰 子</button>
  </div>
</div>

<!-- =================== RESULT SCREEN =================== -->
<div class="screen hidden" id="resultScreen">
  <div class="result-box" id="resultBox">
    <div class="result-crown" id="resultCrown">🎲</div>
    <div class="result-title" id="resultTitle">遊戲結束</div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="result-score">
      <div class="rs-block">
        <div class="rs-label">玩家</div>
        <div class="rs-num p" id="rPlayerScore">0</div>
      </div>
      <div class="rs-vs">:</div>
      <div class="rs-block">
        <div class="rs-label">店家</div>
        <div class="rs-num s" id="rStoreScore">0</div>
      </div>
    </div>
    <div class="result-win-badge" id="resultBadge"></div>
    <button class="result-again-btn" onclick="goLogin()">← 返回</button>
  </div>
</div>

<script>
/* ================================================================
   CONFIGURATION — 修改這裡即可
================================================================ */
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzw9auOy4sMENXw_SzA07wdOdD31Y6FgZTp6cC1IZylbPO8NNgajHEyWW5KDKuVLOhF7w/exec';

/* ================================================================
   GAME MODES CONFIG
================================================================ */
const MODES = [
  { id:1, icon:'♠', name:'王牌對決',  desc:'6骰比牌型',         dice:6, rounds:8, type:'hand'   },
  { id:2, icon:'♣', name:'技巧對決',  desc:'6骰比牌型',         dice:6, rounds:8, type:'hand'   },
  { id:3, icon:'⚄', name:'四骰對決',  desc:'4骰比點數總和',     dice:4, rounds:8, type:'sum'    },
  { id:4, icon:'⏱', name:'限時對決',  desc:'90秒最佳成績',      dice:6, rounds:0, type:'timer'  },
  { id:5, icon:'⚡', name:'膽量對決',  desc:'選6or8骰比總分',   dice:6, rounds:8, type:'brave'  },
  { id:6, icon:'❤', name:'生命決鬥',  desc:'雙方各15命',        dice:6, rounds:0, type:'life'   },
  { id:7, icon:'🔗', name:'連鎖競速',  desc:'先達成目標牌型',    dice:6, rounds:0, type:'chain'  },
  { id:8, icon:'🎯', name:'終極賭注',  desc:'單骰比大小',        dice:1, rounds:8, type:'single' },
];

/* ================================================================
   HAND RANKING
================================================================ */
const HAND_RANKS = ['高牌','一對','兩對','三條','順子','葫蘆','四條','五條'];
function getHand(dice) {
  const cnt = {};
  dice.forEach(d => cnt[d] = (cnt[d]||0)+1);
  const vals = Object.values(cnt).sort((a,b)=>b-a);
  const keys = Object.keys(cnt).map(Number).sort((a,b)=>a-b);
  const isStraight = keys.length===5 && keys[4]-keys[0]===4 && vals[0]===1;
  if(vals[0]===5) return {name:'五條', score:7, tiebreak:Math.max(...dice)};
  if(vals[0]===4) return {name:'四條', score:6, tiebreak:Math.max(...dice)};
  if(vals[0]===3&&vals[1]===2) return {name:'葫蘆', score:5, tiebreak:Math.max(...dice)};
  if(isStraight) return {name:'順子', score:4, tiebreak:keys[4]};
  if(vals[0]===3) return {name:'三條', score:3, tiebreak:Math.max(...dice)};
  if(vals[0]===2&&vals[1]===2) return {name:'兩對', score:2, tiebreak:Math.max(...dice)};
  if(vals[0]===2) return {name:'一對', score:1, tiebreak:Math.max(...dice)};
  return {name:'高牌', score:0, tiebreak:Math.max(...dice)};
}
function rollDice(n) { return Array.from({length:n},()=>Math.floor(Math.random()*6)+1); }

/* ================================================================
   DOT RENDERING
================================================================ */
const DOT_AREAS = {
  1:['c'], 2:['a','b'], 3:['a','c','b'],
  4:['a','b','c','d'], 5:['a','b','c','d','e'], 6:['a','b','c','d','e','f']
};
function makeDie(val, cls, extraClass='') {
  const areas = DOT_AREAS[val]||[];
  const div = document.createElement('div');
  div.className = `die ${cls} ${extraClass}`;
  div.dataset.val = val;
  const dots = document.createElement('div');
  dots.className = `dots dots-${val}`;
  areas.forEach(a => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.style.gridArea = a;
    dots.appendChild(dot);
  });
  div.appendChild(dots);
  return div;
}

/* ================================================================
   STATE
================================================================ */
let G = {
  account:'', phone4:'', isWin:false, mode:null,
  round:1, maxRound:8,
  playerWins:0, storeWins:0,
  rolling:false,
  // mode 4 timer
  timerSec:90, timerInterval:null, bestPlayerSum:0, bestStoreSum:0,
  // mode 5 brave: chosen dice count
  braveChoice:null,
  // mode 6 life
  playerLife:15, storeLife:15,
  // mode 7 chain: target hand, who got it first
  chainTarget:null,
  // planned round outcomes (deterministic win/lose control)
  plan:[]
};

/* ================================================================
   planRounds — 確定性勝負控制 (Fisher-Yates)
================================================================ */
function planRounds(isWin, total) {
  // isWin=true  → 玩家贏 5~8 局
  // isWin=false → 玩家贏 0~3 局
  const arr = Array.from({length:total}, (_,i)=>i);
  // shuffle
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  const winCount = isWin ? (5+Math.floor(Math.random()*4)) : Math.floor(Math.random()*4);
  const plan=[];
  for(let i=0;i<total;i++) plan.push(i<winCount?'win':'lose');
  // shuffle plan
  for(let i=plan.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [plan[i],plan[j]]=[plan[j],plan[i]];
  }
  return plan;
}

/* ================================================================
   LOGIN
================================================================ */
function showError(msg){ const el=document.getElementById('loginError'); el.textContent=msg; el.style.display='block'; }
function hideError(){ document.getElementById('loginError').style.display='none'; }

async function doLogin(){
  const acc = document.getElementById('inputAccount').value.trim().toUpperCase();
  const ph  = document.getElementById('inputPhone').value.trim();
  if(!acc){ showError('請輸入活動帳號'); return; }
  if(!/^\d{4}$/.test(ph)){ showError('請輸入手機末 4 碼（數字）'); return; }

  hideError();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    const url = `${SCRIPT_URL}?action=phone_player_slot&account=${encodeURIComponent(acc)}&phone4=${ph}`;
    const res = await fetch(url);
    const data = await res.json();

    if(data.status==='DENY'){
      const msgs = {
        account_invalid:'帳號不存在或已停用',
        daily_limit:'今日已挑戰過，明天再來！',
        default:'驗證失敗，請聯絡店家'
      };
      showError(msgs[data.reason]||msgs.default);
      btn.disabled=false; btn.textContent='開始挑戰';
      return;
    }

    G.account = acc;
    G.phone4  = ph;
    G.isWin   = !!data.isWin;
    startGame();

  } catch(e) {
    // DEV fallback: bypass GAS for offline testing
    console.warn('GAS unreachable, using fallback', e);
    G.account='TEST'; G.phone4=ph; G.isWin=Math.random()>0.5;
    startGame();
  }
}

/* ================================================================
   START GAME — pick random mode, init state
================================================================ */
function startGame(){
  const modeIdx = Math.floor(Math.random()*MODES.length);
  G.mode = MODES[modeIdx];
  G.round = 1;
  G.playerWins=0; G.storeWins=0;
  G.maxRound = G.mode.rounds || 8;
  G.plan = (G.mode.type!=='timer'&&G.mode.type!=='life'&&G.mode.type!=='chain')
    ? planRounds(G.isWin, G.maxRound) : [];
  G.rolling = false;
  G.braveChoice = null;
  G.playerLife=15; G.storeLife=15;
  G.bestPlayerSum=0; G.bestStoreSum=0;
  G.timerSec=90;
  G.chainTarget = pickChainTarget();

  // Set mode UI
  document.getElementById('modeIcon').textContent = G.mode.icon;
  document.getElementById('modeName').textContent = G.mode.name;
  updateRoundBadge();

  // Init dice grids
  const dCls = `dice-${G.mode.dice>6?8:G.mode.dice}`;
  ['playerDice','storeDice'].forEach(id=>{
    const el=document.getElementById(id);
    el.className='dice-grid '+dCls;
    el.innerHTML='';
    Array.from({length:G.mode.dice}).forEach(()=>{
      el.appendChild(makeDie(1,id.includes('player')?'die-p':'die-s'));
    });
  });

  document.getElementById('playerWins').textContent='0';
  document.getElementById('storeWins').textContent='0';
  document.getElementById('playerHand').textContent='—';
  document.getElementById('storeHand').textContent='—';
  document.getElementById('logArea').innerHTML='<div class="log-entry log-info">— 按下擲骰子開始 —</div>';
  document.getElementById('rollBtn').textContent='擲 骰 子';
  document.getElementById('rollBtn').disabled=false;

  // Special mode init
  const sp=document.getElementById('specialInfo');
  sp.style.display='none'; sp.innerHTML='';

  if(G.mode.type==='life'){
    sp.style.display='block';
    sp.innerHTML=`<div class="life-display">
      <div class="life-block"><div class="rs-label">玩家</div><div class="life-num p" id="lifeP">15</div><div class="life-bar"><div class="life-fill p" id="lifeBarP" style="width:100%"></div></div></div>
      <div class="life-vs">♥</div>
      <div class="life-block"><div class="rs-label">店家</div><div class="life-num s" id="lifeS">15</div><div class="life-bar"><div class="life-fill s" id="lifeBarS" style="width:100%"></div></div></div>
    </div>`;
    G.maxRound=999;
  }
  if(G.mode.type==='timer'){
    sp.style.display='block';
    sp.innerHTML=`<div class="timer-display" id="timerDisp">1:30</div>`;
    document.getElementById('rollBtn').textContent='開 始 計 時';
    G.maxRound=999;
  }
  if(G.mode.type==='chain'){
    sp.style.display='block';
    sp.innerHTML=`<div class="chain-target">目標牌型：<span id="chainTargetLabel">${G.chainTarget}</span>　先達成者勝！</div>`;
    G.maxRound=999;
  }

  showScreen('gameScreen');
}

function pickChainTarget(){
  const targets=['一對','兩對','三條','順子','葫蘆','四條'];
  return targets[Math.floor(Math.random()*targets.length)];
}

/* ================================================================
   ROLL
================================================================ */
function doRoll(){
  if(G.rolling) return;
  const t = G.mode.type;

  // Start timer mode
  if(t==='timer' && !G.timerInterval){
    startTimer(); return;
  }

  // Brave mode: choose dice count
  if(t==='brave' && !G.braveChoice){
    chooseBrave(); return;
  }

  G.rolling=true;
  document.getElementById('rollBtn').disabled=true;

  const diceCount = (t==='brave'&&G.braveChoice)?G.braveChoice:G.mode.dice;
  const pDice=rollDice(diceCount);
  const sDice=rollDice(diceCount);

  // Apply deterministic outcome tweak if applicable
  let plannedWin = G.plan[G.round-1]; // 'win' | 'lose' | undefined

  animateDice('playerDice', pDice, 'die-p', ()=>{
    animateDice('storeDice', sDice, 'die-s', ()=>{
      resolveRound(pDice, sDice, plannedWin, t);
    }, 80);
  }, 0);
}

function animateDice(containerId, values, cls, cb, delay){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  values.forEach(v=>{
    const d=makeDie(v,cls,'rolling');
    el.appendChild(d);
    setTimeout(()=>d.classList.remove('rolling'), 600);
  });
  setTimeout(cb, 640+delay);
}

/* ================================================================
   RESOLVE ROUND
================================================================ */
function resolveRound(pDice, sDice, plannedWin, type){
  let pScore, sScore, pLabel, sLabel, winner;

  if(type==='hand'||type==='brave'){
    const pH=getHand(pDice), sH=getHand(sDice);
    pScore=pH.score+(pH.tiebreak*0.01);
    sScore=sH.score+(sH.tiebreak*0.01);
    pLabel=pH.name; sLabel=sH.name;
    // nudge for deterministic
    if(plannedWin==='win' && pScore<=sScore) pScore=sScore+0.1;
    if(plannedWin==='lose'&& pScore>=sScore) sScore=pScore+0.1;
    winner = pScore>sScore?'player':sScore>pScore?'store':'draw';
  }
  else if(type==='sum'||type==='single'){
    pScore=pDice.reduce((a,b)=>a+b,0);
    sScore=sDice.reduce((a,b)=>a+b,0);
    pLabel=`總和 ${pScore}`; sLabel=`總和 ${sScore}`;
    if(plannedWin==='win' && pScore<=sScore) pScore=sScore+1;
    if(plannedWin==='lose'&& pScore>=sScore) sScore=pScore+1;
    winner=pScore>sScore?'player':sScore>pScore?'store':'draw';
  }
  else if(type==='timer'){
    pScore=pDice.reduce((a,b)=>a+b,0);
    sScore=sDice.reduce((a,b)=>a+b,0);
    pLabel=`${pScore}點`; sLabel=`${sScore}點`;
    if(pScore>G.bestPlayerSum) G.bestPlayerSum=pScore;
    if(sScore>G.bestStoreSum) G.bestStoreSum=sScore;
    winner=pScore>sScore?'player':sScore>pScore?'store':'draw';
  }
  else if(type==='life'){
    const pH=getHand(pDice),sH=getHand(sDice);
    pScore=pH.score; sScore=sH.score;
    pLabel=pH.name; sLabel=sH.name;
    const diff=Math.abs(pScore-sScore)||1;
    if(pScore<sScore){ G.playerLife=Math.max(0,G.playerLife-diff); winner='store'; }
    else if(sScore<pScore){ G.storeLife=Math.max(0,G.storeLife-diff); winner='player'; }
    else { winner='draw'; }
    updateLife();
  }
  else if(type==='chain'){
    const pH=getHand(pDice),sH=getHand(sDice);
    pLabel=pH.name; sLabel=sH.name;
    winner='draw';
    if(pH.name===G.chainTarget){ winner='player'; }
    else if(sH.name===G.chainTarget){ winner='store'; }
  }

  // Apply win/lose visuals
  const pEl=document.getElementById('playerDice');
  const sEl=document.getElementById('storeDice');
  pEl.querySelectorAll('.die').forEach(d=>{ if(winner==='player') d.classList.add('win'); });
  sEl.querySelectorAll('.die').forEach(d=>{ if(winner==='store')  d.classList.add('win'); });

  // Update labels
  document.getElementById('playerHand').textContent = pLabel||'—';
  document.getElementById('storeHand').textContent  = sLabel||'—';

  // Tally
  if(winner==='player') G.playerWins++;
  else if(winner==='store') G.storeWins++;
  document.getElementById('playerWins').textContent=G.playerWins;
  document.getElementById('storeWins').textContent =G.storeWins;

  // Log
  const resultTxt = winner==='player'?'玩家勝':winner==='store'?'店家勝':'平局';
  const logCls = winner==='player'?'log-win':winner==='store'?'log-lose':'';
  addLog(`第${G.round}回合：玩家 ${pLabel} vs 店家 ${sLabel} → ${resultTxt}`, logCls);
  if(winner==='player') spawnParticles(true);

  G.round++;
  updateRoundBadge();
  G.rolling=false;
  G.braveChoice=null;

  // Check end conditions
  if(type==='life'){
    if(G.playerLife<=0||G.storeLife<=0){ setTimeout(endGame,800); return; }
    document.getElementById('rollBtn').disabled=false;
    return;
  }
  if(type==='chain'){
    if(winner==='player'||winner==='store'){ setTimeout(endGame,800); return; }
    document.getElementById('rollBtn').disabled=false;
    return;
  }
  if(type!=='timer'){
    if(G.round>G.maxRound){ setTimeout(endGame,800); return; }
    document.getElementById('rollBtn').disabled=false;
  }
}

/* ================================================================
   TIMER MODE
================================================================ */
function startTimer(){
  G.timerSec=90; G.bestPlayerSum=0; G.bestStoreSum=0;
  document.getElementById('rollBtn').textContent='擲 骰 子';
  G.timerInterval=setInterval(()=>{
    G.timerSec--;
    const m=Math.floor(G.timerSec/60), s=G.timerSec%60;
    const td=document.getElementById('timerDisp');
    if(td){ td.textContent=`${m}:${s<10?'0':''}${s}`; if(G.timerSec<=10) td.classList.add('urgent'); }
    if(G.timerSec<=0){ clearInterval(G.timerInterval); G.timerInterval=null; setTimeout(endGame,400); }
  },1000);
}

/* ================================================================
   BRAVE MODE
================================================================ */
function chooseBrave(){
  // Simple inline prompt via log area
  addLog('選擇骰子數：', 'log-info');
  G.rolling=false;
  const bar=document.getElementById('action-bar');
  const btn=document.getElementById('rollBtn');
  // Replace button temporarily
  btn.textContent='6骰（安全）';
  btn.onclick=()=>{ G.braveChoice=6; btn.textContent='擲 骰 子'; btn.onclick=doRoll; doRoll(); };
  // add 8 dice button
  let btn8=document.getElementById('btn8');
  if(!btn8){
    btn8=document.createElement('button');
    btn8.id='btn8'; btn8.className='roll-btn';
    btn8.style.marginLeft='8px'; btn8.style.width='auto'; btn8.style.padding='13px 28px';
    btn8.textContent='8骰（冒險）';
    document.querySelector('.action-bar').appendChild(btn8);
  }
  btn8.onclick=()=>{
    G.braveChoice=8;
    document.getElementById('playerDice').className='dice-grid dice-8';
    document.getElementById('storeDice').className='dice-grid dice-8';
    btn.textContent='擲 骰 子'; btn.onclick=doRoll;
    btn8.remove(); doRoll();
  };
}

/* ================================================================
   LIFE BAR UPDATE
================================================================ */
function updateLife(){
  const maxL=15;
  const lp=document.getElementById('lifeP'), ls=document.getElementById('lifeS');
  const lbp=document.getElementById('lifeBarP'), lbs=document.getElementById('lifeBarS');
  if(lp) lp.textContent=G.playerLife;
  if(ls) ls.textContent=G.storeLife;
  if(lbp) lbp.style.width=(G.playerLife/maxL*100)+'%';
  if(lbs) lbs.style.width=(G.storeLife/maxL*100)+'%';
}

/* ================================================================
   END GAME
================================================================ */
function endGame(){
  if(G.timerInterval){ clearInterval(G.timerInterval); G.timerInterval=null; }
  const t=G.mode.type;
  let finalWinner, pFinal, sFinal;

  if(t==='timer'){
    pFinal=G.bestPlayerSum; sFinal=G.bestStoreSum;
    // Deterministic final
    if(G.isWin && pFinal<=sFinal) pFinal=sFinal+2;
    if(!G.isWin && pFinal>=sFinal) sFinal=pFinal+2;
    finalWinner=pFinal>sFinal?'player':'store';
  } else if(t==='life'){
    pFinal=G.playerLife; sFinal=G.storeLife;
    finalWinner=pFinal>sFinal?'player':sFinal>pFinal?'store':'draw';
  } else if(t==='chain'){
    pFinal=G.playerWins; sFinal=G.storeWins;
    finalWinner=pFinal>sFinal?'player':sFinal>pFinal?'store':'draw';
  } else {
    pFinal=G.playerWins; sFinal=G.storeWins;
    finalWinner=pFinal>sFinal?'player':sFinal>pFinal?'store':'draw';
  }

  // Build result screen
  const isPlayerWin = finalWinner==='player';
  const isDraw = finalWinner==='draw';
  document.getElementById('resultCrown').textContent = isPlayerWin?'🏆':isDraw?'🤝':'🎲';
  document.getElementById('resultTitle').textContent = isPlayerWin?'恭喜獲勝！':isDraw?'平局':';下次再來！';
  document.getElementById('resultSubtitle').textContent = `${G.mode.icon} ${G.mode.name}`;
  document.getElementById('rPlayerScore').textContent=pFinal;
  document.getElementById('rStoreScore').textContent=sFinal;

  const badge=document.getElementById('resultBadge');
  if(isPlayerWin){
    badge.className='result-win-badge badge-win';
    badge.textContent = G.isWin ? '🎁 恭喜！您已獲得獎品！' : '未中獎場次';
  } else if(isDraw){
    badge.className='result-win-badge badge-draw';
    badge.textContent='平局';
  } else {
    badge.className='result-win-badge badge-lose';
    badge.textContent='未中獎，明天再來';
  }

  if(isPlayerWin) spawnParticles(true, 30);
  showScreen('resultScreen');
}

/* ================================================================
   UI HELPERS
================================================================ */
function showScreen(id){
  ['loginScreen','gameScreen','resultScreen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}
function goLogin(){ showScreen('loginScreen'); }
function doQuit(){ endGame(); }

function updateRoundBadge(){
  const t=G.mode.type;
  if(t==='life')  { document.getElementById('roundBadge').textContent='生命決鬥'; return; }
  if(t==='timer') { document.getElementById('roundBadge').textContent='限時模式'; return; }
  if(t==='chain') { document.getElementById('roundBadge').textContent='連鎖競速'; return; }
  const r=Math.min(G.round, G.maxRound);
  document.getElementById('roundBadge').textContent=`第 ${r} / ${G.maxRound} 回合`;
}

function addLog(msg, cls=''){
  const el=document.getElementById('logArea');
  const div=document.createElement('div');
  div.className='log-entry '+cls;
  div.textContent=msg;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

/* ================================================================
   PARTICLES
================================================================ */
function spawnParticles(gold=true, count=14){
  const colors=gold
    ? ['#f0c84a','#c9a227','#ffe08a','#ffb800']
    : ['#e87070','#c03030','#ff8080'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=4+Math.random()*6;
    const x=20+Math.random()*60;
    const y=30+Math.random()*40;
    p.style.cssText=`
      left:${x}vw; top:${y}vh;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --tx:${(Math.random()-0.5)*120}px;
      --ty:${-40-Math.random()*80}px;
      animation-delay:${Math.random()*0.3}s;
      animation-duration:${0.9+Math.random()*0.6}s;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 2000);
  }
}

/* ================================================================
   ENTER KEY support
================================================================ */
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const ls=document.getElementById('loginScreen');
    if(!ls.classList.contains('hidden')) doLogin();
  }
});
</script>
