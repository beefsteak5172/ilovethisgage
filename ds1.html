<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎲 骰子遊戲 · 店員驗證台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060b14;--bg2:#0d1526;--accent:#f0a500;--accent2:#ff6b35;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --text:#e8eaf0;--muted:rgba(232,234,240,0.45);
  --border:rgba(255,255,255,0.08);
  --radius:18px;--mono:'Share Tech Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);}

/* BG */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(240,165,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(240,165,0,.04) 1px,transparent 1px);
  background-size:40px 40px;}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(240,165,0,.12) 0%,transparent 70%);}

/* CLOCK */
#clock{position:fixed;top:14px;right:16px;z-index:50;font-family:var(--mono);font-size:12px;color:var(--muted);}

/* LAYOUT */
#app{position:relative;z-index:1;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;}

/* HEADER */
.header{text-align:center;margin-bottom:20px;}
.header-badge{display:inline-flex;align-items:center;gap:8px;padding:4px 14px;border-radius:100px;
  border:1px solid rgba(240,165,0,.4);background:rgba(240,165,0,.08);
  font-size:11px;color:var(--accent);font-family:var(--mono);letter-spacing:2px;margin-bottom:10px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 1.8s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.6)}50%{opacity:.6;box-shadow:0 0 0 5px transparent}}
.header h1{font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;
  background:linear-gradient(135deg,#f0a500,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;}
.header p{font-size:12px;color:var(--muted);}

/* CARD */
.card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);}

/* FIELDS */
.field{margin-bottom:14px;}
.field-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--accent);font-family:var(--mono);
  margin-bottom:5px;display:flex;align-items:center;gap:6px;}
.field-label .req{color:var(--red);}
.field-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;color:#fff;font-size:1.6rem;font-weight:900;font-family:var(--mono);
  text-align:center;letter-spacing:.3em;cursor:pointer;caret-color:transparent;outline:none;
  transition:border-color .2s,box-shadow .2s;}
.field-input:focus,.field-input.active-field{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,165,0,.15);}
.field-input::placeholder{color:rgba(255,255,255,.2);font-size:1rem;letter-spacing:.05em;}

/* VERIFY BTN */
#verify-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f0a500,#ff6b35);border:none;
  border-radius:12px;color:#000;font-size:1rem;font-weight:900;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;letter-spacing:1px;transition:transform .15s,box-shadow .15s,opacity .15s;
  box-shadow:0 4px 20px rgba(240,165,0,.3);margin-top:2px;}
#verify-btn:active{transform:scale(.98);}
#verify-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* MSG */
#msg{margin-top:10px;padding:11px 14px;border-radius:10px;font-size:.85rem;font-weight:700;
  text-align:center;display:none;line-height:1.5;}
#msg.show{display:block;}
#msg.loading{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#93c5fd;}
#msg.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
#msg.warning{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#fcd34d;}

/* ============================================================
   STEP 2 — NAME CHOICE OVERLAY
   ============================================================ */
#name-overlay{position:fixed;inset:0;z-index:90;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:20px;
  background:rgba(4,8,20,.94);backdrop-filter:blur(14px);}
#name-overlay.show{display:flex;}

.nc-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid rgba(240,165,0,.25);
  border-radius:24px;padding:28px 20px 20px;text-align:center;position:relative;overflow:hidden;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
.nc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);}

.nc-icon{font-size:2.6rem;margin-bottom:6px;}
.nc-title{font-size:1.15rem;font-weight:900;color:#fff;margin-bottom:2px;}
.nc-sub{font-size:.78rem;color:var(--muted);margin-bottom:14px;}

/* Strike pips */
.strike-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;}
.strike-label{font-size:.72rem;color:var(--muted);font-family:var(--mono);letter-spacing:1px;}
.strike-pips{display:flex;gap:6px;}
.strike-pip{width:22px;height:8px;border-radius:4px;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  transition:background .3s,border-color .3s,box-shadow .3s;}
.strike-pip.hit{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(239,68,68,.5);}

/* ID badge */
.nc-id-badge{display:inline-block;background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);
  border-radius:10px;padding:5px 18px;font-family:var(--mono);font-size:1.4rem;font-weight:900;
  color:var(--accent);letter-spacing:6px;margin-bottom:16px;}

/* Choice buttons */
.nc-choices{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.nc-choice{width:100%;padding:13px 16px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.12);border-radius:13px;
  color:#fff;font-size:.98rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;text-align:center;transition:background .15s,border-color .15s,transform .1s;}
.nc-choice:active:not(:disabled){transform:scale(.97);}
.nc-choice:hover:not(:disabled){background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25);}
.nc-choice.shake{animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.nc-choice.correct-pick{background:rgba(34,197,94,.2)!important;border-color:var(--green)!important;color:#4ade80!important;}
.nc-choice.wrong-pick{background:rgba(239,68,68,.15)!important;border-color:rgba(239,68,68,.4)!important;color:#f87171!important;}
.nc-choice:disabled{cursor:not-allowed;opacity:.6;}

.nc-note{font-size:.73rem;color:rgba(255,255,255,.28);}

/* ============================================================
   RESULT OVERLAY
   ============================================================ */
#result-overlay{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(12px);}
#result-overlay.show{display:flex;}
#result-overlay.pass{background:rgba(0,10,5,.92);}
#result-overlay.fail{background:rgba(10,0,0,.92);}
#result-overlay.used{background:rgba(5,5,15,.92);}
#result-overlay.banned{background:rgba(20,0,0,.95);}

.result-card{width:100%;max-width:380px;border-radius:24px;padding:36px 28px 28px;
  text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.pass-card{background:linear-gradient(135deg,#0a2a18,#0d3b22);border:2px solid #22c55e;box-shadow:0 0 60px rgba(34,197,94,.25);}
.fail-card{background:linear-gradient(135deg,#2a0a0a,#3b0d0d);border:2px solid #ef4444;box-shadow:0 0 60px rgba(239,68,68,.25);}
.used-card{background:linear-gradient(135deg,#1a1a0a,#2a260d);border:2px solid #f59e0b;box-shadow:0 0 60px rgba(245,158,11,.2);}
.banned-card{background:linear-gradient(135deg,#1a0000,#2e0a0a);border:2px solid #7f1d1d;box-shadow:0 0 60px rgba(127,29,29,.4);}

.result-icon{font-size:4.5rem;margin-bottom:12px;animation:iconBounce .5s .2s both;}
@keyframes iconBounce{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.result-title{font-size:2rem;font-weight:900;margin-bottom:8px;}
.pass-card .result-title{color:#4ade80;}
.fail-card .result-title{color:#f87171;}
.used-card .result-title{color:#fbbf24;}
.banned-card .result-title{color:#fca5a5;}
.result-info{font-size:.88rem;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:18px;}
.result-player{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;
  font-family:var(--mono);color:#fff;margin-bottom:14px;border:1px solid rgba(255,255,255,.1);}
.result-player .rp-id{font-size:1.3rem;font-weight:900;color:var(--accent);letter-spacing:4px;}
.result-player .rp-name{margin-top:4px;color:rgba(255,255,255,.7);font-size:.85rem;}
.result-count{font-size:.8rem;color:rgba(255,255,255,.35);margin-bottom:14px;}
.result-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:900;
  font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:transform .15s;}
.result-btn:active{transform:scale(.97);}
.result-btn-pass{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
  box-shadow:0 4px 16px rgba(34,197,94,.3);margin-bottom:8px;}
.result-btn-back{background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1);}
.auto-reset-bar{height:3px;border-radius:2px;margin-top:14px;background:rgba(255,255,255,.1);overflow:hidden;}
.auto-reset-fill{height:100%;border-radius:2px;width:100%;transition:width linear;}
.pass-card .auto-reset-fill{background:var(--green);}
.fail-card .auto-reset-fill,.banned-card .auto-reset-fill{background:var(--red);}
.used-card .auto-reset-fill{background:var(--accent);}

/* ============================================================
   VIRTUAL KEYBOARD
   ============================================================ */
#vkb{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);
  transition:transform .28s cubic-bezier(.22,1,.36,1);z-index:9999;
  background:#0c1426;border-top:1px solid rgba(240,165,0,.2);border-radius:20px 20px 0 0;
  padding:10px 10px 14px;box-shadow:0 -8px 40px rgba(0,0,0,.6);width:min(360px,99vw);}
#vkb.show{transform:translateX(-50%) translateY(0);}

#vkb-mode-strip{text-align:center;font-size:10px;font-family:var(--mono);letter-spacing:2px;
  color:var(--accent);margin-bottom:7px;opacity:.7;}

.vkb-row{display:flex;gap:5px;margin-bottom:5px;justify-content:center;}
.vkb-row:last-child{margin-bottom:0;}

.vk{flex:1;height:44px;background:#162034;border:1px solid rgba(255,255,255,.07);border-radius:9px;
  color:#e2e8f0;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;outline:none;
  transition:background .1s,transform .08s,border-color .1s;
  display:flex;align-items:center;justify-content:center;min-width:0;}
.vk:active{background:#f0a500;color:#000;transform:scale(.92);border-color:#f0a500;}
.vk-num{height:38px;font-size:.9rem;}
.vk-del{background:#1e1520;}
.vk-del:active{background:#ef4444 !important;color:#fff !important;}
/* SHIFT — inactive = dim, active = lit */
.vk-shift{background:#1a2540;border-color:rgba(99,130,247,.25);color:rgba(165,180,252,.6);}
.vk-shift.caps-on{background:rgba(99,130,247,.3);border-color:#6366f1;color:#c7d2fe;
  box-shadow:0 0 8px rgba(99,130,247,.3);}
.vk-shift:active{background:#6366f1 !important;color:#fff !important;transform:scale(.92);}
.vk-ok{background:linear-gradient(135deg,#f0a500,#ff6b35);color:#000;border-color:#f0a500;
  font-size:.78rem;letter-spacing:.5px;}
.vk-ok:active{background:#d4920a !important;color:#000 !important;}
.vk-wide{flex:2;}
.vk-space{flex:3;font-size:.7rem;color:rgba(255,255,255,.35);letter-spacing:2px;}
/* In ID mode, grey-out space & symbols */
#vkb.id-mode .vk-sym{opacity:.22;pointer-events:none;}

::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div id="clock"></div>

<!-- ===== STEP 1 ===== -->
<div id="app">
  <div class="header">
    <div class="header-badge"><span class="live-dot"></span>STAFF TERMINAL</div>
    <h1>🎲 骰子遊戲 兌換驗證</h1>
    <p>輸入 LINE ID 末 4 碼，讓玩家從選項中確認名稱</p>
  </div>
  <div class="card">
    <div class="field">
      <div class="field-label">LINE ID 末 4 碼（英 / 數）<span class="req">*</span></div>
      <input id="inp-id" class="field-input" type="text" inputmode="none"
             maxlength="4" placeholder="A1B2" readonly autocomplete="off">
    </div>
    <button id="verify-btn" disabled>🔍 查詢玩家</button>
    <div id="msg"></div>
  </div>
</div>

<!-- ===== STEP 2: NAME CHOICE ===== -->
<div id="name-overlay">
  <div class="nc-card">
    <div class="nc-icon">🎭</div>
    <div class="nc-title">請讓玩家自行選出名字</div>
    <div class="nc-sub">手機交給玩家，點選正確的 LINE 顯示名稱</div>
    <div class="strike-row">
      <span class="strike-label">剩餘機會</span>
      <div class="strike-pips">
        <div class="strike-pip" id="sp1"></div>
        <div class="strike-pip" id="sp2"></div>
      </div>
    </div>
    <div class="nc-id-badge" id="nc-id-badge">----</div>
    <div class="nc-choices" id="nc-choices"></div>
    <div class="nc-note">選錯 2 次將喪失今日兌換資格</div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-overlay">
  <div class="result-card" id="result-card">
    <div class="result-icon" id="r-icon"></div>
    <div class="result-title" id="r-title"></div>
    <div class="result-info" id="r-info"></div>
    <div class="result-player" id="r-player" style="display:none">
      <div class="rp-id" id="r-player-id"></div>
      <div class="rp-name" id="r-player-name"></div>
    </div>
    <div class="result-count" id="r-count"></div>
    <button class="result-btn result-btn-pass" id="r-launch" style="display:none">🎮 啟動遊戲（本機）</button>
    <button class="result-btn result-btn-back" id="r-back">↩ 返回重新查詢</button>
    <div class="auto-reset-bar"><div class="auto-reset-fill" id="r-bar"></div></div>
  </div>
</div>

<!-- ===== KEYBOARD ===== -->
<div id="vkb">
  <div id="vkb-mode-strip">LINE ID 末4碼</div>
  <!-- Numbers -->
  <div class="vkb-row">
    <button class="vk vk-num" data-k="1">1</button><button class="vk vk-num" data-k="2">2</button>
    <button class="vk vk-num" data-k="3">3</button><button class="vk vk-num" data-k="4">4</button>
    <button class="vk vk-num" data-k="5">5</button><button class="vk vk-num" data-k="6">6</button>
    <button class="vk vk-num" data-k="7">7</button><button class="vk vk-num" data-k="8">8</button>
    <button class="vk vk-num" data-k="9">9</button><button class="vk vk-num" data-k="0">0</button>
  </div>
  <!-- Q-P -->
  <div class="vkb-row" id="row-qp">
    <button class="vk" data-k="Q">Q</button><button class="vk" data-k="W">W</button>
    <button class="vk" data-k="E">E</button><button class="vk" data-k="R">R</button>
    <button class="vk" data-k="T">T</button><button class="vk" data-k="Y">Y</button>
    <button class="vk" data-k="U">U</button><button class="vk" data-k="I">I</button>
    <button class="vk" data-k="O">O</button><button class="vk" data-k="P">P</button>
  </div>
  <!-- A-L -->
  <div class="vkb-row" id="row-al">
    <button class="vk" data-k="A">A</button><button class="vk" data-k="S">S</button>
    <button class="vk" data-k="D">D</button><button class="vk" data-k="F">F</button>
    <button class="vk" data-k="G">G</button><button class="vk" data-k="H">H</button>
    <button class="vk" data-k="J">J</button><button class="vk" data-k="K">K</button>
    <button class="vk" data-k="L">L</button>
  </div>
  <!-- Shift + Z-M + Del -->
  <div class="vkb-row" id="row-zm">
    <button class="vk vk-shift caps-on" id="vk-shift" data-k="shift">⇧</button>
    <button class="vk" data-k="Z">Z</button><button class="vk" data-k="X">X</button>
    <button class="vk" data-k="C">C</button><button class="vk" data-k="V">V</button>
    <button class="vk" data-k="B">B</button><button class="vk" data-k="N">N</button>
    <button class="vk" data-k="M">M</button>
    <button class="vk vk-del vk-wide" data-k="del">⌫</button>
  </div>
  <!-- Bottom: symbols + space + confirm -->
  <div class="vkb-row">
    <button class="vk vk-sym" data-k="_">_</button>
    <button class="vk vk-sym" data-k=".">.</button>
    <button class="vk vk-space vk-sym" data-k=" ">SPACE</button>
    <button class="vk vk-sym" data-k="-">-</button>
    <button class="vk vk-ok vk-wide" data-k="ok">確認 ✓</button>
  </div>
</div>

<script>
'use strict';

// ★ 設定
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzdKTR4mT7wo1ksu_9RSGXlmlHEtSgxiy2HUH7XdIcVQ9Z-ZOw4__GVrb8rsxoiYkqKKQ/exec';
const GAME_URL   = 'file:///C:/gamechefbozo/index2.html';

// ---- Clock ----
(function(){
  const el=document.getElementById('clock');
  const t=()=>{el.textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false});};
  t(); setInterval(t,1000);
})();

// ---- Refs ----
const inpId     = document.getElementById('inp-id');
const verifyBtn = document.getElementById('verify-btn');
const msgEl     = document.getElementById('msg');
const vkb       = document.getElementById('vkb');
const shiftBtn  = document.getElementById('vk-shift');

// ---- State ----
let isUpperCase   = true;
let strikes       = 0;
let correctName   = '';
let currentId4    = '';
let autoResetTimer = null;
let choiceBlocked = false;  // prevent rapid double-tap

// ---- Helpers ----
function checkReady(){ verifyBtn.disabled = inpId.value.length !== 4; }
function showMsg(t,tp){ msgEl.textContent=t; msgEl.className='show '+tp; }
function hideMsg(){ msgEl.className=''; }

// ============================================================
// KEYBOARD — case toggle
// ============================================================
function setCase(upper){
  isUpperCase = upper;
  shiftBtn.classList.toggle('caps-on', upper);
  vkb.querySelectorAll('.vk[data-k]').forEach(btn=>{
    const k = btn.dataset.k;
    if(k && /^[a-zA-Z]$/.test(k)){
      const nk = upper ? k.toUpperCase() : k.toLowerCase();
      btn.dataset.k   = nk;
      btn.textContent = nk;
    }
  });
}
// Start uppercase
setCase(true);

function showVkb(){
  vkb.classList.add('show','id-mode');
  document.getElementById('vkb-mode-strip').textContent = 'LINE ID 末4碼';
  inpId.classList.add('active-field');
}
function hideVkb(){
  vkb.className = '';
  inpId.classList.remove('active-field');
}

// Tap field
inpId.addEventListener('click', showVkb);
inpId.addEventListener('focus', showVkb);
document.addEventListener('click', e=>{
  if(!vkb.contains(e.target) && e.target!==inpId) hideVkb();
});

// Key press
vkb.addEventListener('click', function(e){
  const btn = e.target.closest('.vk');
  if(!btn) return;
  const k = btn.dataset.k;
  if(!k) return;

  if(k === 'shift'){
    setCase(!isUpperCase);
    return;
  }
  if(k === 'ok'){
    hideVkb();
    checkReady();
    return;
  }
  if(k === 'del'){
    inpId.value = inpId.value.slice(0,-1);
    checkReady();
    return;
  }
  // Symbols disabled in ID mode (CSS handles visually, JS guards)
  if(k === ' ' || k === '_' || k === '-' || k === '.') return;

  if(inpId.value.length < 4){
    // Always store uppercase for ID
    inpId.value += k.toUpperCase();
    if(inpId.value.length === 4) hideVkb();
  }
  checkReady();
});

// ============================================================
// STEP 1 — LOOKUP
// ============================================================
verifyBtn.addEventListener('click', async function(){
  const id4 = inpId.value.trim();
  if(id4.length !== 4) return;
  hideVkb();
  showMsg('查詢中… 請稍候','loading');
  verifyBtn.disabled = true;

  try{
    const url = `${SCRIPT_URL}?action=staff_lookup&id4=${encodeURIComponent(id4)}&t=${Date.now()}`;
    const res  = await fetch(url, {redirect:'follow'});
    const data = await res.json();
    hideMsg();

    if(data.status === 'USED'){
      showResult('used',{
        id:id4, name:data.realName||'',
        info:`此玩家<strong>今日已兌換過</strong>骰子遊戲<br>請勿重複放行`,
        count: data.usedTime ? `兌換時間：${data.usedTime}` : ''
      });
    } else if(data.status === 'FOUND'){
      currentId4  = id4;
      correctName = data.realName;
      strikes     = 0;
      choiceBlocked = false;
      startNameChoice(id4, data.choices); // choices = 3 names shuffled
    } else if(data.status === 'DENY'){
      showResult('fail',{
        info:`查無末4碼 <strong>${id4}</strong> 的今日骰子簽到紀錄<br>
          <span style="font-size:.8rem;color:rgba(255,255,255,.35)">請確認玩家已完成今日簽到</span>`
      });
    } else {
      showMsg(data.message||'系統回應異常，請重試','error');
      verifyBtn.disabled = false;
    }
  } catch(e){
    hideMsg();
    showMsg('⚠️ 網路錯誤，請確認連線後重試','error');
    verifyBtn.disabled = false;
  }
});

// ============================================================
// STEP 2 — NAME CHOICE
// ============================================================
function updateStrikePips(){
  document.getElementById('sp1').classList.toggle('hit', strikes >= 1);
  document.getElementById('sp2').classList.toggle('hit', strikes >= 2);
}

function startNameChoice(id4, choices){
  document.getElementById('nc-id-badge').textContent = id4;
  updateStrikePips();

  const container = document.getElementById('nc-choices');
  container.innerHTML = '';
  choices.forEach(name=>{
    const btn = document.createElement('button');
    btn.className   = 'nc-choice';
    btn.textContent = name;
    btn.addEventListener('click', ()=>handleChoice(btn, name));
    container.appendChild(btn);
  });

  document.getElementById('name-overlay').classList.add('show');
}

function handleChoice(btn, chosen){
  if(choiceBlocked) return;
  choiceBlocked = true;

  const allBtns = document.querySelectorAll('.nc-choice');
  allBtns.forEach(b=>{ b.disabled = true; });

  if(chosen === correctName){
    btn.classList.add('correct-pick');
    setTimeout(()=>{
      document.getElementById('name-overlay').classList.remove('show');
      commitVerification(currentId4, correctName);
    }, 650);
  } else {
    strikes++;
    btn.classList.add('wrong-pick','shake');
    updateStrikePips();

    if(strikes >= 2){
      // All wrong — banned
      setTimeout(()=>{
        document.getElementById('name-overlay').classList.remove('show');
        showResult('banned',{
          info:`連續選錯 2 次<br>今日兌換資格已喪失<br>
            <span style="font-size:.8rem;opacity:.5">如有疑問請洽服務人員</span>`
        });
      }, 900);
    } else {
      // 1 strike — re-enable other buttons
      setTimeout(()=>{
        btn.classList.remove('shake');
        allBtns.forEach(b=>{
          if(b !== btn){ b.disabled = false; }
        });
        choiceBlocked = false;
      }, 500);
    }
  }
}

// ============================================================
// COMMIT — write 玩_骰子
// ============================================================
async function commitVerification(id4, name){
  showMsg('驗證通過，寫入紀錄中…','loading');
  try{
    const url = `${SCRIPT_URL}?action=staff_commit&id4=${encodeURIComponent(id4)}&name=${encodeURIComponent(name)}&t=${Date.now()}`;
    const res  = await fetch(url,{redirect:'follow'});
    const data = await res.json();
    hideMsg();
    showResult('pass',{
      id:id4, name:name,
      info:`驗證完成<br>今日簽到時間：<strong>${data.signTime||'已記錄'}</strong>`,
      count: data.playCount ? `歷史第 ${data.playCount} 次玩骰子` : ''
    });
  } catch(e){
    hideMsg();
    showResult('pass',{
      id:id4, name:name,
      info:`驗證通過<br>
        <span style="color:#fcd34d;font-size:.8rem;">⚠️ 紀錄寫入失敗，請手動補填</span>`
    });
  }
}

// ============================================================
// RESULT
// ============================================================
function showResult(type, data){
  const overlay = document.getElementById('result-overlay');
  const card    = document.getElementById('result-card');
  overlay.className = 'show '+type;
  card.className    = 'result-card '+type+'-card';

  const icons  = {pass:'✅',fail:'❌',used:'⏳',banned:'🚫'};
  const titles = {pass:'驗證通過！',fail:'查無紀錄',used:'今日已兌換',banned:'資格喪失'};
  document.getElementById('r-icon').textContent  = icons[type]||'❓';
  document.getElementById('r-title').textContent = titles[type]||'';
  document.getElementById('r-info').innerHTML    = data.info||'';

  const pb = document.getElementById('r-player');
  if(data.id){
    pb.style.display='block';
    document.getElementById('r-player-id').textContent   = data.id;
    document.getElementById('r-player-name').textContent = data.name||'';
  } else {
    pb.style.display='none';
  }
  document.getElementById('r-count').textContent = data.count||'';

  const lb = document.getElementById('r-launch');
  if(type==='pass'){
    lb.style.display='block';
    lb.onclick=()=>{ try{window.open(GAME_URL,'_blank');}catch(e){} };
  } else {
    lb.style.display='none';
  }

  const secs = type==='pass' ? 30 : 12;
  const bar  = document.getElementById('r-bar');
  bar.style.transition='none'; bar.style.width='100%';
  setTimeout(()=>{ bar.style.transition=`width ${secs}s linear`; bar.style.width='0%'; },80);
  if(autoResetTimer) clearTimeout(autoResetTimer);
  autoResetTimer = setTimeout(resetAll, secs*1000);
}

document.getElementById('r-back').addEventListener('click', resetAll);

function resetAll(){
  document.getElementById('result-overlay').className='';
  document.getElementById('name-overlay').classList.remove('show');
  if(autoResetTimer){clearTimeout(autoResetTimer);autoResetTimer=null;}
  hideMsg();
  inpId.value='';
  strikes=0; correctName=''; currentId4=''; choiceBlocked=false;
  checkReady();
  hideVkb();
  updateStrikePips();
  verifyBtn.disabled = true;
}

// ---- Prevent zoom ----
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('dblclick',e=>e.preventDefault());
</script>
