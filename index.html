<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 簽到</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 28px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .logo { font-size: 48px; margin-bottom: 8px; }
  .title { font-size: 22px; font-weight: 700; color: #1B5E20; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .activity-badge {
    display: inline-block;
    background: #E8F5E9;
    color: #2E7D32;
    border: 1.5px solid #A5D6A7;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 24px;
    margin-bottom: 24px;
  }
  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    background: #2E7D32;
    color: #fff;
    margin-top: 8px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    display: none;
  }
  .result.success { background: #E8F5E9; color: #1B5E20; border: 1px solid #A5D6A7; }
  .result.warn    { background: #FFF8E1; color: #E65100; border: 1px solid #FFE082; }
  .result.error   { background: #FFEBEE; color: #B71C1C; border: 1px solid #FFCDD2; }
  .loading { color: #888; font-size: 14px; margin-top: 16px; }
  .user-info { font-size: 12px; color: #aaa; margin-top: 16px; }

  /* emoji icons */
  .icon { font-size: 36px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🥩</div>
  <div class="title">無名牛排</div>
  <div class="subtitle">每日簽到 · 天天好康</div>

  <div id="loading-area" class="loading">載入中...</div>

  <div id="main-area" style="display:none;">
    <div class="icon" id="activity-icon"></div>
    <div class="activity-badge" id="activity-label"></div>
    <div id="user-name" class="user-info"></div>
    <button class="btn" id="checkin-btn" onclick="doCheckin()">立即簽到 ✓</button>
    <div class="result" id="result-box"></div>
  </div>
</div>

<script>
// ── 設定：填入你的 Apps Script 部署網址 ──
const GAS_URL = "https://script.google.com/macros/s/AKfycbw5gG_ddQbc9U4Nc3Y6WC4s_wglCZRyGNcgKQY1uX13mMfFf3ayxYFVjEnp0JVAw8tW/exec";

const ACTIVITY_INFO = {
  chicken: { icon: "🍗", label: "炸雞活動" },
  shake:   { icon: "🎲", label: "搖骰子" },
  dice:    { icon: "🎮", label: "每日遊戲" }
};

let liffProfile = null;
let activityType = "";

async function init() {
  await liff.init({ liffId: "2009772018-YA6NBDMf" });

  // 取得 ?type= 參數
  activityType = new URL(location.href).searchParams.get("type") || "";

  const info = ACTIVITY_INFO[activityType];
  if (!info) {
    showError("未知的活動類型，請重新掃描 QR Code");
    return;
  }

  // 取得用戶 Profile
  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href });
    return;
  }

  liffProfile = await liff.getProfile();

  document.getElementById("activity-icon").textContent  = info.icon;
  document.getElementById("activity-label").textContent = info.label;
  document.getElementById("user-name").textContent      = "👤 " + liffProfile.displayName;

  document.getElementById("loading-area").style.display = "none";
  document.getElementById("main-area").style.display    = "block";

  // 預先查詢是否已簽到（用 GET + no-cors iframe trick，改用 script tag jsonp 方式）
  checkStatus();
}

// 用 script tag JSONP 方式繞過 CORS 限制查詢狀態
function checkStatus() {
  const cbName = "gasCallback_" + Date.now();
  const script = document.createElement("script");
  const url = GAS_URL
    + "?userId=" + encodeURIComponent(liffProfile.userId)
    + "&type="   + encodeURIComponent(activityType)
    + "&callback=" + cbName;

  window[cbName] = function(data) {
    delete window[cbName];
    document.body.removeChild(script);
    if (data && data.alreadyCheckedIn) {
      showResult("warn", "你今天已經簽到過「" + data.activity + "」了！\n明天再來 🌟");
      document.getElementById("checkin-btn").disabled = true;
      document.getElementById("checkin-btn").textContent = "今日已簽到";
    }
  };

  script.onerror = function() {
    delete window[cbName];
    try { document.body.removeChild(script); } catch(e) {}
  };

  script.src = url;
  document.body.appendChild(script);
}

async function doCheckin() {
  const btn = document.getElementById("checkin-btn");
  btn.disabled = true;
  btn.textContent = "簽到中...";

  try {
    // 用 form POST 方式送出，GAS 會從 e.parameter 讀取
    const formData = new FormData();
    formData.append("userId",      liffProfile.userId);
    formData.append("displayName", liffProfile.displayName);
    formData.append("type",        activityType);

    const res = await fetch(GAS_URL, {
      method: "POST",
      body: formData
    });
    const data = await res.json();

    if (data.success) {
      showResult("success", "🎉 簽到成功！\n活動：" + data.activity + "\n時間：" + data.date + " " + data.time);
      btn.textContent = "已簽到 ✓";
    } else if (data.alreadyCheckedIn) {
      showResult("warn", "你今天已經簽到過了！\n明天再來 🌟");
      btn.textContent = "今日已簽到";
    } else {
      showResult("error", "簽到失敗：" + data.message);
      btn.disabled = false;
      btn.textContent = "重試";
    }
  } catch(err) {
    showResult("error", "連線錯誤，請稍後再試");
    btn.disabled = false;
    btn.textContent = "重試";
  }
}

function showResult(type, msg) {
  const box = document.getElementById("result-box");
  box.className = "result " + type;
  box.textContent = msg;
  box.style.display = "block";
}

function showError(msg) {
  document.getElementById("loading-area").textContent = "⚠ " + msg;
}

init().catch(e => showError("初始化失敗：" + e.message));
</script>
</body>
</html>
