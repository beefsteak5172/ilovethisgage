<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無名牛排 簽到</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 36px 28px 32px;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .logo { font-size: 48px; margin-bottom: 8px; }
  .title { font-size: 22px; font-weight: 700; color: #1B5E20; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }
  .activity-badge {
    display: inline-block;
    background: #E8F5E9;
    color: #2E7D32;
    border: 1.5px solid #A5D6A7;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 600;
    padding: 8px 24px;
    margin-bottom: 24px;
  }
  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    background: #2E7D32;
    color: #fff;
    margin-top: 8px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    display: none;
    white-space: pre-line;
  }
  .result.success { background: #E8F5E9; color: #1B5E20; border: 1px solid #A5D6A7; }
  .result.warn    { background: #FFF8E1; color: #E65100; border: 1px solid #FFE082; }
  .result.error   { background: #FFEBEE; color: #B71C1C; border: 1px solid #FFCDD2; }
  .loading { color: #888; font-size: 14px; margin-top: 16px; }
  .user-info { font-size: 12px; color: #aaa; margin-top: 16px; }
  .icon { font-size: 36px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🥩</div>
  <div class="title">無名牛排</div>
  <div class="subtitle">每日簽到 · 天天好康</div>

  <div id="loading-area" class="loading">載入中...</div>

  <div id="main-area" style="display:none;">
    <div class="icon" id="activity-icon"></div>
    <div class="activity-badge" id="activity-label"></div>
    <div id="user-name" class="user-info"></div>
    <button class="btn" id="checkin-btn" onclick="doCheckin()">立即簽到 ✓</button>
    <div class="result" id="result-box"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ★ 設定區：兩個值必須正確
// ══════════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycby67piX4xN0TBGf9-IuVfQrzPDaAcroOFd0n0yP83Mt7-57Zu4HIeo9QKQIw8NrIGcGpQ/exec";
const LIFF_ID = "2009772018-YA6NBDMf";
// ══════════════════════════════════════════════════════

const ACTIVITY_INFO = {
  chicken: { icon: "🍗", label: "炸雞活動" },
  shake:   { icon: "🎲", label: "搖骰子" },
  dice:    { icon: "🎮", label: "每日遊戲" }
};

let liffProfile  = null;
let activityType = "";

async function init() {
  await liff.init({ liffId: LIFF_ID });

  activityType = new URL(location.href).searchParams.get("type") || "";
  const info = ACTIVITY_INFO[activityType];
  if (!info) {
    showError("未知的活動類型，請重新掃描 QR Code");
    return;
  }

  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href });
    return;
  }

  liffProfile = await liff.getProfile();

  document.getElementById("activity-icon").textContent  = info.icon;
  document.getElementById("activity-label").textContent = info.label;
  document.getElementById("user-name").textContent      = "👤 " + liffProfile.displayName;

  document.getElementById("loading-area").style.display = "none";
  document.getElementById("main-area").style.display    = "block";

  checkStatus();
}

// 預先查詢今日是否已簽到
function checkStatus() {
  const url = GAS_URL
    + "?action=check_today"
    + "&lineuid=" + encodeURIComponent(liffProfile.userId)
    + "&type="    + encodeURIComponent(activityType);

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (data.status === "DENY") {
        showResult("warn", "你今天已經簽到過了！\n明天再來 🌟");
        const btn = document.getElementById("checkin-btn");
        btn.disabled = true;
        btn.textContent = "今日已簽到";
      }
    })
    .catch(() => {});
}

async function doCheckin() {
  const btn = document.getElementById("checkin-btn");
  btn.disabled = true;
  btn.textContent = "簽到中...";

  try {
    // ★ GET + action=sign_in + lineuid（修正原本 POST + userId 的錯誤）
    const params = new URLSearchParams({
      action:      "sign_in",
      lineuid:     liffProfile.userId,
      displayName: liffProfile.displayName,
      type:        activityType
    });

    const res  = await fetch(GAS_URL + "?" + params.toString());
    const data = await res.json();

    if (data.status === "OK") {
      const today     = new Date();
      const dateStr   = today.getFullYear() + "-"
                      + String(today.getMonth()+1).padStart(2,"0") + "-"
                      + String(today.getDate()).padStart(2,"0");
      const timesText = data.isFirstEver
        ? "🌟 首次參加！歡迎加入！"
        : "📅 第 " + data.visitCount + " 次參加此活動";
      showResult("success",
        "🎉 簽到成功！\n" +
        "活動：" + ACTIVITY_INFO[activityType].label + "\n" +
        "日期：" + dateStr + "\n" +
        "玩家編號：" + (data.uid4 || "----") + "\n" +
        timesText + "\n\n" +
        "⚠️ 請勿關閉此視窗\n店員確認後方可離開"
      );
      btn.textContent = "已簽到 ✓";

    } else if (data.status === "DENY") {
      showResult("warn", "你今天已經簽到過了！\n明天再來 🌟");
      btn.textContent = "今日已簽到";

    } else {
      showResult("error", "簽到失敗：" + (data.message || "未知錯誤"));
      btn.disabled = false;
      btn.textContent = "重試";
    }

  } catch(err) {
    showResult("error", "連線錯誤，請稍後再試");
    btn.disabled = false;
    btn.textContent = "重試";
  }
}

function showResult(type, msg) {
  const box = document.getElementById("result-box");
  box.className = "result " + type;
  box.textContent = msg;
  box.style.display = "block";
}

function showError(msg) {
  document.getElementById("loading-area").textContent = "⚠ " + msg;
}

init().catch(e => showError("初始化失敗：" + e.message));
</script>
</body>
</html>
